  position: absolute; inset: 0;
  overflow-y: auto; padding: 16px;
  transform-origin: top center;
  backface-visibility: hidden;
}
.binder-card::-webkit-scrollbar { width: 4px; }
.binder-card::-webkit-scrollbar-track { background: var(--binder-bg2); }
.binder-card::-webkit-scrollbar-thumb { background: var(--binder-border); }

@keyframes binder-flip-out {
  0% { transform: rotateX(0deg); opacity: 1; }
  100% { transform: rotateX(-88deg); opacity: 0; }
}
@keyframes binder-flip-in {
  0% { transform: rotateX(88deg); opacity: 0; }
  100% { transform: rotateX(0deg); opacity: 1; }
}
.binder-card.flipping-out { animation: binder-flip-out 0.28s ease-in forwards; }
.binder-card.flipping-in  { animation: binder-flip-in  0.28s ease-out forwards; }

/* Binder card content */
#binder-card-parent-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
  color: var(--term-green-glo); text-transform: uppercase;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
}
#binder-card-parent-meta {
  font-size: 7px; color: var(--binder-meta-color); letter-spacing: 0.12em;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--binder-border);
  display: flex; align-items: center; gap: 12px;
}

.binder-node-card {
  background: var(--binder-card-bg);
  border: 1px solid var(--binder-border2);
  border-left: 2px solid;
  margin-bottom: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.12s;
  position: relative;
}
.binder-node-card:hover { background: var(--binder-card-hover); }
.binder-node-card:hover .bnc-title { color: var(--binder-ink); }

.bnc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.bnc-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.bnc-title { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--binder-ink2); flex: 1; }
.bnc-id { font-size: 6px; color: var(--binder-id-color); letter-spacing: 0.1em; }
.bnc-tags { display: flex; gap: 4px; }
.bnc-tag { font-size: 6px; padding: 1px 5px; border-radius: 1px; font-weight: 700; letter-spacing: 0.1em; }
.bnc-tag.urgent { background: rgba(204,34,34,0.15); color: #cc4444; border: 1px solid rgba(204,34,34,0.25); }
.bnc-tag.review { background: rgba(204,170,0,0.15); color: #aa8800; border: 1px solid rgba(204,170,0,0.25); }
.bnc-tag.personal { background: rgba(68,170,68,0.15); color: #2a8a2a; border: 1px solid rgba(68,170,68,0.25); }
body.dark-mode .bnc-tag.urgent { color: #ff6666; }
body.dark-mode .bnc-tag.review { color: #ddbb44; }
body.dark-mode .bnc-tag.personal { color: #66dd66; }
.bnc-date { font-size: 6px; color: #aa8800; letter-spacing: 0.1em; }
body.dark-mode .bnc-date { color: #ccaa00; }
.bnc-notes {
  font-size: 9px; color: var(--binder-note-color); line-height: 1.75;
  font-style: italic; letter-spacing: 0.03em;
  white-space: pre-wrap; overflow: hidden;
  max-height: 72px; position: relative;
}
.bnc-notes::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 20px;
  background: linear-gradient(transparent, var(--binder-card-bg));
  pointer-events: none;
}
.binder-node-card:hover .bnc-notes { color: var(--binder-ink2); }
.bnc-nav-hint {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 8px; color: var(--binder-id-color); opacity: 0;
  transition: opacity 0.12s;
}
.binder-node-card:hover .bnc-nav-hint { opacity: 1; color: var(--term-green-glo); }
.binder-empty {
  padding: 24px 0; font-size: 8px; color: var(--binder-empty-color);
  letter-spacing: 0.1em; font-style: italic;
  text-align: center;
}

/* Children subsection inside binder card */
.bnc-children {
  margin-top: 6px; padding-top: 6px;
  border-top: 1px solid var(--binder-border);
  display: flex; flex-direction: column; gap: 4px;
}
.bnc-child-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; background: var(--binder-input-bg); cursor: pointer;
  border: 1px solid #0d0d0d; transition: background 0.08s;
}
.bnc-child-row:hover { background: #111; border-color: var(--term-green); }
.bnc-child-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
.bnc-child-name { font-size: 7px; color: var(--binder-ink3); letter-spacing: 0.1em; font-weight: 600; flex: 1; }
.bnc-child-notes-hint { font-size: 6px; color: var(--binder-meta-color); font-style: italic; }

/* ═══ NOTES POPOUT ═══ */
#notes-popout {
  position: fixed;
  background: var(--lumon-ink);
  border: 1px solid #2a2060;
  border-top: 2px solid var(--term-green-glo);
  width: 420px; max-width: 45vw;
  min-height: 300px;
  z-index: 700;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  font-family: var(--font);
  display: none; flex-direction: column;
  top: 80px; right: calc(50vw - 450px);
  resize: both; overflow: hidden;
}
#notes-popout.open { display: flex; }
#notes-popout-header {
  padding: 9px 14px 8px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #1a1a1a; background: #080808;
  cursor: move; flex-shrink: 0;
}
#notes-popout-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
#notes-popout-title { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: #c8c4be; flex: 1; }
#notes-popout-label { font-size: 7px; color: var(--binder-meta-color); letter-spacing: 0.14em; }
#notes-popout-close {
  background: transparent; border: none; color: var(--binder-meta-color);
  font-size: 13px; cursor: pointer; padding: 0 2px;
  font-family: var(--font); transition: color 0.1s;
}
#notes-popout-close:hover { color: #cc4444; }
#notes-popout-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#notes-popout-textarea {
  flex: 1; width: 100%; min-height: 240px; box-sizing: border-box;
  background: var(--binder-bg); border: none;
  border-left: 3px solid var(--term-green);
  color: #b0aca4; font-family: var(--font); font-size: 11px;
  padding: 14px 16px; resize: none; outline: none;
  line-height: 1.85; letter-spacing: 0.03em;
}
#notes-popout-textarea:focus { border-left-color: var(--term-green-glo); background: var(--binder-card-bg); }
#notes-popout-footer {
  padding: 7px 14px; border-top: 1px solid #0d0d0d;
  display: flex; gap: 8px; background: #060606; flex-shrink: 0;
}
.npop2-btn {
  font-family: var(--font); font-size: 7px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 4px 12px; cursor: pointer; transition: all 0.1s;
}
.npop2-btn.accent { color: var(--term-green-glo); border: 1px solid var(--term-green); background: transparent; }
.npop2-btn.accent:hover { background: rgba(45,106,45,0.18); }
.npop2-btn.muted { color: var(--binder-note-color); border: 1px solid var(--binder-border); background: transparent; }
.npop2-btn.muted:hover { background: var(--binder-card-hover); color: #888; }

/* ══════════════════════════════════════════════════════════════
   MOBILE OVERRIDES — iPhone-optimized BRAINBUG
   All original CSS is preserved above; these overrides take precedence.
   ══════════════════════════════════════════════════════════════ */

/* ── Global touch behaviour ── */
* { -webkit-tap-highlight-color: transparent; }
html, body { touch-action: manipulation; }

/* Prevent iOS rubber-band scroll on canvas — handled by D3 */
#canvas-container, svg#chart { touch-action: none; }

/* ── Root sizing ── */
:root {
  --tc-btn: 52px;
  --bottom-bar-h: 64px;  /* node toolbar / action bar height */
  --safe-bottom: env(safe-area-inset-bottom, 16px);
}

/* ── Canvas sits between topbar and bottom action bar ── */
#canvas-container {
  bottom: calc(var(--bottom-bar-h) + var(--safe-bottom));
}

/* ══ TOPBAR ══ */
#topbar {
  height: var(--topbar-h);
  padding: 0 10px;
  gap: 0;
  justify-content: space-between;
  overflow: visible;
}
/* Hide desktop-only topbar elements */
#btn-undo, #btn-redo, .bar-sep, #btn-reset-view, .btn-key,
#arrow-pan-hint, #hotkey-popup, #hotkey-popup-header,
#hotkey-popup-body, #btn-hotkey-guide,
#status-ticker-wrap { display: none !important; }

/* Hide logo entirely on mobile */
.logo { display: none !important; }

/* Panel tabs — fill remaining space, equal width, dot + ultra-short label */
#topbar-panels {
  margin-left: 0;
  height: 100%;
  border-left: none;
  flex: 1;
  display: flex;
}
.tpanel-tab {
  flex: 1;
  padding: 0 4px;
  font-size: 8px;
  letter-spacing: 0.08em;
  gap: 4px;
  min-width: 0;
  justify-content: center;
}
.tpanel-dot { width: 6px; height: 6px; flex-shrink: 0; }

/* Menu button — fixed size, never squished */
#btn-menu {
  flex-shrink: 0;
  padding: 0 14px;
  font-size: 9px;
  height: 34px;
  letter-spacing: 0.10em;
  margin-left: 6px;
  white-space: nowrap;
}

/* ══ TOPBAR PANEL DROPDOWN ══ */
#topbar-panel-wrap {
  left: 0 !important;
  right: 0 !important;
  width: 100vw !important;
}
#topbar-panel-body {
  width: 100vw !important;
  max-height: 55vh;
  overflow-y: auto;
}
#rdx-cards { max-height: 42vh; }

/* Panel rows — bigger touch targets */
.idx-row { padding: 12px 12px 12px 10px; }
.idx-label { font-size: 11px; }
.rdx-card-tab { padding: 13px 12px 13px 16px; }
.rdx-tab-label { font-size: 11px; }
.cal-day { font-size: 10px; }
.cal-day-num { font-size: 10px; }
.cal-event-item { padding: 10px 10px; }
.cal-event-label { font-size: 10px; }
.cal-nav-btn { font-size: 18px; padding: 4px 8px; min-width: 36px; }

/* ══ STATUS BAR — hidden, replaced by bottom toolbar ══ */
#statusbar { display: none !important; }

/* ══ NODE TOOLBAR — compact full-width bottom bar ══ */
:root { --bottom-bar-h: 52px; }

#node-toolbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  transform: translateY(120%);
  transition: transform 0.32s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.22s ease;
  opacity: 0;
  width: 100%;
  z-index: 150;
  pointer-events: none;
}
#node-toolbar.visible {
  transform: translateY(0);
  opacity: 1;
  pointer-events: all;
}
#node-toolbar-inner {
  display: flex;
  align-items: stretch;
  width: 100%;
  height: var(--bottom-bar-h);
  border-radius: 0;
  border-left: none; border-right: none; border-bottom: none;
  border-top: 2px solid var(--ntb-accent, var(--term-green));
  overflow: hidden;
}
#node-toolbar-inner::before { display: none; }

/* Node name label — fixed 90px, icon on right */
#ntb-label {
  width: 90px;
  flex: 0 0 90px;
  padding: 0 8px;
  border-right: 1px solid #1e1e1e;
  min-width: 0;
  justify-content: center;
  gap: 0;
}
#ntb-label-name {
  font-size: 9px;
  padding-right: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
#ntb-label-sub { display: none; }
#ntb-label::after { display: none; }

/* 4 action buttons fill the rest — icons only */
.ntb-btn {
  flex: 1;
  padding: 0;
  min-width: 0;
  gap: 2px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.ntb-key  { display: none; }
.ntb-text { display: none; }
.ntb-icon { font-size: 16px; opacity: 0.65; line-height: 1; }

/* ══ TOOL CLUSTER (bottom-left) ══ */
:root { --tc-btn: 46px; }
#tool-cluster-left {
  left: 10px;
  bottom: calc(var(--bottom-bar-h) + 10px);
}
#tcleft-add { font-size: 18px; }
.tc-key { display: none; }

/* ══ ZOOM CONTROLS (bottom-right) ══ */
#zoom-controls {
  right: 10px;
  bottom: calc(var(--bottom-bar-h) + 10px);
  gap: 2px;
}
.zoom-btn { width: var(--tc-btn); height: var(--tc-btn); font-size: 18px; }
#btn-hotkey-guide { display: none !important; }

/* ══ CONTEXT MENU — finger-friendly ══ */
#context-menu {
  min-width: 260px;
  border-radius: 4px;
}
.ctx-item {
  padding: 14px 16px;
  font-size: 13px;
  gap: 12px;
}
.ctx-key { display: none; }
.ctx-icon { font-size: 15px; }
.ctx-header { font-size: 9px; padding: 10px 16px 8px; }

/* ══ MENU DROPDOWN — bottom sheet on mobile ══ */
#menu-dropdown {
  top: auto !important;
  bottom: 0;
  right: 0; left: 0;
  width: 100% !important;
  max-height: 80vh;
  overflow-y: auto;
  border-radius: 12px 12px 0 0;
  border-top: 2px solid var(--term-green-glo);
  border-left: none;
  border-right: none;
  border-bottom: none;
  padding-bottom: var(--safe-bottom);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
}
#menu-dropdown-header {
  padding: 12px 18px 10px;
  position: sticky; top: 0; z-index: 1;
  background: var(--lumon-ink);
}
#menu-dropdown-title { font-size: 9px; }
#menu-dropdown-close { font-size: 18px; padding: 4px 6px; }
.menu-btn { padding: 14px 18px; font-size: 10px; }
.menu-btn-key { display: none; }
.menu-section { padding: 10px 18px; }
.menu-orbit-btn { width: 34px; height: 34px; font-size: 16px; }

/* Scale slider — bigger thumb for touch */
#menu-scale-slider::-webkit-slider-thumb { width: 20px; height: 20px; }
#menu-orbit-slider::-webkit-slider-thumb { width: 20px; height: 20px; }
#menu-scale-slider { height: 4px; }
#menu-orbit-slider { height: 4px; }
.menu-section-title { font-size: 8px; letter-spacing: 0.16em; margin-bottom: 10px; }

/* Theme swatches — bigger on mobile */
.menu-theme-swatch { width: 30px; height: 26px; }
.swatch-group-row { gap: 5px; }
.swatch-group-label { font-size: 7px; }

/* ══ MODAL — full-screen bottom sheet ══ */
#modal-overlay {
  align-items: flex-end;
  padding: 0;
}
#modal {
  width: 100% !important;
  max-width: 100vw !important;
  max-height: 92vh !important;
  border-radius: 14px 14px 0 0 !important;
  border-top: 2px solid var(--term-green) !important;
  border-left: none; border-right: none; border-bottom: none;
  padding-bottom: var(--safe-bottom);
}
#modal-header { padding: 16px 18px 12px; }
#modal-node-label { font-size: 16px; }
.modal-close-btn {
  font-size: 9px;
  padding: 8px 14px;
  height: 38px;
}
#modal-body { padding: 14px 18px 12px; gap: 14px; }
#modal-row-top { flex-direction: column; gap: 12px; }
#modal-name-col, #modal-tags-col { width: 100%; }
#modal-node-name-input { font-size: 15px; height: 46px; }
.tag-toggles { gap: 8px; }
.tag-toggle { padding: 9px 12px; font-size: 9px; }
#modal-date { font-size: 12px; height: 36px; }
#modal-date-clear { font-size: 9px; padding: 8px 12px; }
#modal-sc-row { gap: 8px; }
.modal-sc-btn { padding: 12px 14px; }
.modal-sc-label { font-size: 8px; }
.modal-sc-popup { position: fixed !important; left: 8px !important; right: 8px !important; width: auto !important; min-width: 0 !important; top: auto !important; bottom: 12vh; z-index: 9999 !important; }
#modal-color-cell .modal-sc-popup { min-width: 0 !important; }
.color-swatch { width: 34px; height: 34px; }
#node-size-slider::-webkit-slider-thumb { width: 22px; height: 22px; }
#node-size-slider { height: 5px; }
#modal-notes { min-height: 130px; font-size: 13px; }
.mfooter-btn { font-size: 10px; padding: 10px 18px; height: 42px; }
#modal-footer { padding: 12px 18px; }

/* ══ CONNECT / UNLINK HINTS ══ */
#connect-hint, #unlink-hint {
  top: calc(var(--topbar-h) + 8px);
  font-size: 10px;
  padding: 8px 20px;
  max-width: 88vw;
  text-align: center;
  border-radius: 4px;
}

/* ══ ORPHAN DIALOG ══ */
#orphan-dialog { width: 88vw !important; }
#orphan-dialog-header { font-size: 10px; padding: 14px 16px; }
#orphan-dialog-body { padding: 16px; }
.orphan-btn { font-size: 10px; padding: 12px 16px; }

/* ══ NOTE POPUP (quick preview) ══ */
#note-popup {
  left: 12px !important; right: 12px !important;
  top: auto !important;
  bottom: calc(var(--bottom-bar-h) + 12px) !important;
  width: auto !important;
}
.npop-btn { font-size: 10px; padding: 10px 16px; }

/* ══ NOTES POPOUT — full-screen on mobile ══ */
#notes-popout {
  position: fixed;
  inset: var(--topbar-h) 0 0 0;
  width: 100% !important;
  max-width: 100vw !important;
  min-height: 0 !important;
  top: var(--topbar-h);
  right: 0 !important;
  resize: none;
  border-radius: 0;
  padding-bottom: var(--safe-bottom);
}
#notes-popout-textarea { font-size: 14px; min-height: 0; }
.npop2-btn { font-size: 9px; padding: 10px 18px; }

/* ══ BINDER OVERLAY — full-screen ══ */
#binder-overlay { background: rgba(0,0,0,0.92); }
#binder-container {
  width: 100vw !important; max-width: 100vw !important;
  height: 100vh !important; max-height: 100vh !important;
  border-radius: 0 !important;
  flex-direction: column !important;
}
#binder-header { padding: 14px 16px; }
#binder-title { font-size: 10px; }
#binder-subtitle { display: none; }
#binder-body { flex-direction: column !important; }
#binder-left {
  width: 100% !important;
  height: auto !important;
  max-height: 40vh;
  overflow-y: auto;
  border-right: none !important;
  border-bottom: 1px solid #1a1a1a;
}
#binder-right { flex: 1; min-height: 0; }
.binder-parent-tab { padding: 0 12px; font-size: 9px; }
.bnc-title { font-size: 10px; }
.bnc-notes { font-size: 10px; }
.bnc-save-btn, .bnc-cancel-btn { font-size: 9px; padding: 9px 16px; }
#binder-close { font-size: 9px; padding: 8px 14px; }

/* ══ NODE PIN BADGE ══ */
.node-pin-badge { font-size: 11px !important; }


</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div id="topbar">
  <div class="logo" id="logo-btn" style="cursor:default;" title="BRAINBUG">
    <span class="logo-cross">✝</span>
    <span class="logo-title">BRAINBUG</span>
  </div>
  <!-- Integrated panel tabs -->
  <div id="topbar-panels">
    <button class="tpanel-tab active" data-panel="index"><span class="tpanel-dot"></span>INDEX</button>
    <button class="tpanel-tab" data-panel="cal"><span class="tpanel-dot"></span>CAL</button>
    <button class="tpanel-tab" data-panel="map"><span class="tpanel-dot"></span>MAP</button>
  </div>
  <input type="file" id="file-import" accept=".json" style="display:none">
  <button class="btn accent" id="btn-menu">⊹ MENU</button>
</div>

<!-- ═══ TOP MENU DROPDOWN ═══ -->
<div id="menu-dropdown">
  <div id="menu-dropdown-header">
    <span id="menu-dropdown-title">⊹ SYSTEM CONTROLS</span>
    <button id="menu-dropdown-close">✕</button>
  </div>
  <div id="menu-dropdown-body">
    <!-- Dark Mode Toggle -->
    <button class="menu-btn" id="menu-darkmode-btn">
      <span class="menu-btn-icon">◑</span>
      <span class="menu-btn-label">DARK MODE</span>
      <span class="dm-indicator"></span>
    </button>
    <!-- Binder -->
    <button class="menu-btn binder-btn" id="menu-binder-btn">
      <span class="menu-btn-icon">⊹</span>
      <span class="menu-btn-label">OPEN BINDER</span>
    </button>
    <!-- Undo / Redo / Reset (moved from topbar) -->
    <button class="menu-btn" id="btn-undo" style="opacity:0.35;pointer-events:none;">
      <span class="menu-btn-icon">↩</span>
      <span class="menu-btn-label">UNDO</span>
    </button>
    <button class="menu-btn" id="btn-redo" style="opacity:0.35;pointer-events:none;">
      <span class="menu-btn-icon">↪</span>
      <span class="menu-btn-label">REDO</span>
    </button>
    <button class="menu-btn" id="btn-reset-view">
      <span class="menu-btn-icon">◎</span>
      <span class="menu-btn-label">RESET VIEW</span>
    </button>
    <!-- Theme Section -->
    <div class="menu-section">
      <div class="menu-section-title">INTERFACE COLOR</div>
      <div id="menu-theme-swatches"></div>
    </div>
    <!-- Orbit Radius -->
    <div class="menu-section">
      <div class="menu-section-title">ROOT ORBIT RADIUS</div>
      <div class="menu-orbit-row">
        <button class="menu-orbit-btn" id="menu-orbit-dec">−</button>
        <div class="menu-orbit-track">
          <input type="range" id="menu-orbit-slider" min="80" max="420" step="10" value="220">
          <span id="menu-orbit-val">220</span>
        </div>
        <button class="menu-orbit-btn" id="menu-orbit-inc">+</button>
      </div>
    </div>
    <!-- Data Actions -->
    <button class="menu-btn" id="menu-export-btn">
      <span class="menu-btn-icon">↓</span>
      <span class="menu-btn-label">EXPORT DATA</span>
    </button>
    <button class="menu-btn" id="menu-import-btn">
      <span class="menu-btn-icon">↑</span>
      <span class="menu-btn-label">IMPORT DATA</span>
    </button>
    <button class="menu-btn danger" id="menu-clear-btn">
      <span class="menu-btn-icon">✕</span>
      <span class="menu-btn-label">CLEAR ALL NODES</span>
    </button>
  </div>
</div>

<!-- ═══ TOPBAR DROPDOWN PANEL ═══ -->
<div id="topbar-panel-wrap">
  <div id="topbar-panel-peek"></div>
  <div id="topbar-panel-body">

    <!-- INDEX PANEL (default) -->
    <div id="panel-index" class="tool-panel active">
      <div id="index-header">
        <span id="index-header-title" title="Click to close panel" style="cursor:pointer;">✦ NODE INDEX</span>
        <span id="index-header-count">— RECORDS</span>
      </div>
      <div id="rdx-cards"></div>
      <!-- Notes Summary collapsed section -->
      <div id="notes-summary-section">
        <div id="notes-summary-toggle" style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:#070707;border-top:1px solid #111;border-bottom:1px solid #0d0d0d;cursor:pointer;user-select:none;">
          <span id="notes-summary-arrow" style="font-size:7px;color:#4a6a4a;transition:transform 0.18s;display:inline-block;">▶</span>
          <span style="font-size:6px;color:#4a6a4a;letter-spacing:0.22em;font-weight:700;">✎ NODE NOTES SUMMARY</span>
          <span id="notes-summary-count" style="font-size:6px;color:#2a2825;letter-spacing:0.1em;margin-left:auto;">—</span>
        </div>
        <div id="notes-summary-body" style="display:none;max-height:220px;overflow-y:auto;">
          <div id="notes-tree"></div>
        </div>
      </div>
    </div>

    <!-- CALENDAR PANEL -->
    <div id="panel-cal" class="tool-panel">
      <div id="cal-header">
        <span id="cal-header-title">◫ CALENDAR</span>
        <div class="cal-nav">
          <button class="cal-nav-btn" id="cal-prev">‹</button>
          <span id="cal-month-label">—</span>
          <button class="cal-nav-btn" id="cal-next">›</button>
        </div>
      </div>
      <div id="cal-body">
        <div id="cal-grid"></div>
        <div id="cal-event-list">
          <div id="cal-event-header">SCHEDULED NODES</div>
          <div id="cal-events"></div>
        </div>
      </div>
    </div>

    <!-- MAP PANEL -->
    <div id="panel-map" class="tool-panel">
      <div id="map-header">
        <span id="map-header-title">◈ OVERVIEW MAP</span>
        <span id="map-header-meta">— NODES</span>
      </div>
      <canvas id="minimap-canvas" width="320" height="200"></canvas>
    </div>

    <!-- UI PANEL -->

  </div>
</div>

<!-- ═══ ARROW PAN HINT ═══ -->
<div id="arrow-pan-hint">⊕ PAN MODE — ARROW KEYS MOVE VIEW · [ENTER] EXIT</div>

<!-- ═══ NOTE POPUP ═══ -->
<div id="note-popup">
  <div id="note-popup-header">
    <div id="note-popup-dot"></div>
    <div id="note-popup-title">NOTE</div>
    <button id="note-popup-close">✕</button>
  </div>
  <div id="note-popup-body"></div>
  <div id="note-popup-footer">
    <button class="npop-btn accent" id="note-popup-open-btn">OPEN DETAILS</button>
    <button class="npop-btn muted" id="note-popup-nav-btn">NAVIGATE →</button>
  </div>
</div>

<!-- ═══ CONNECT MODE HINT ═══ -->
<div id="connect-hint">⟷ CONNECT MODE — CLICK TARGET NODE · [ESC] CANCEL</div>

<!-- ═══ UNLINK MODE HINT ═══ -->
<div id="unlink-hint">⌀ UNLINK MODE — CLICK FIRST NODE · [ESC] CANCEL</div>

<!-- ═══ ORPHAN NODE DIALOG ═══ -->
<div id="orphan-overlay">
  <div id="orphan-dialog">
    <div id="orphan-dialog-header">⚠ DISCONNECTED NODE</div>
    <div id="orphan-dialog-body">
      <div id="orphan-node-name" style="font-size:11px;font-weight:700;color:#c8c4be;margin-bottom:8px;letter-spacing:0.1em;"></div>
      <div style="font-size:9px;color:#6a6860;letter-spacing:0.1em;line-height:1.7;">This node is no longer connected to any tree. What would you like to do?</div>
    </div>
    <div id="orphan-dialog-footer">
      <button class="orphan-btn connect" id="orphan-connect-btn">⟷ CONNECT TO NODE</button>
      <button class="orphan-btn delete" id="orphan-delete-btn">✕ DELETE NODE</button>
    </div>
  </div>
</div>

<!-- ═══ BINDER OVERLAY ═══ -->
<div id="binder-overlay">
  <div id="binder-container">
    <div id="binder-header">
      <span id="binder-title">⊹ BINDER — DATA LEDGER</span>
      <span id="binder-subtitle">MIND MAP ARCHIVE · FLIP TO NAVIGATE</span>
      <button id="binder-close">✕ CLOSE</button>
    </div>
    <div id="binder-body">
      <!-- Left: Calendar -->
      <div id="binder-left">
        <div id="binder-cal-header">
          <span id="binder-cal-title">◫ SCHEDULE</span>
          <div class="binder-cal-nav">
            <button class="binder-cal-nav-btn" id="binder-cal-prev">‹</button>
            <span id="binder-cal-month">—</span>
            <button class="binder-cal-nav-btn" id="binder-cal-next">›</button>
          </div>
        </div>
        <div id="binder-cal-body">
          <div id="binder-cal-grid"></div>
        </div>
        <div id="binder-events-section">
          <div id="binder-events-header">SCHEDULED NODES</div>
          <div id="binder-events-list"></div>
        </div>
        <!-- Binder minimap -->
        <div id="binder-map-section">
          <div id="binder-map-header">◈ NODE MAP</div>
          <canvas id="binder-minimap" width="280" height="160"></canvas>
        </div>
      </div>
      <!-- Right: Rolodex cards -->
      <div id="binder-right">
        <div id="binder-rolodex-header"></div>
        <div id="binder-rolodex-viewport">
          <div id="binder-card-stage">
            <div class="binder-card" id="binder-card-active"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ NOTES POPOUT ═══ -->
<div id="notes-popout">
  <div id="notes-popout-header">
    <div id="notes-popout-dot"></div>
    <div id="notes-popout-title-wrap" style="flex:1;min-width:0;">
      <div id="notes-popout-title" style="font-size:9px;font-weight:700;letter-spacing:0.12em;color:#c8c4be;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">NOTES</div>
      <div id="notes-popout-node-id" style="font-size:6px;color:#3a3835;letter-spacing:0.1em;"></div>
    </div>
    <label id="notes-popout-follow-wrap" title="Follow canvas selection" style="display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;margin-right:6px;">
      <input type="checkbox" id="notes-popout-follow-btn" style="display:none;">
      <span id="notes-popout-follow-dot" style="width:20px;height:10px;border-radius:5px;background:#1a1a1a;border:1px solid #2a2a2a;position:relative;display:inline-block;transition:background 0.2s;">
        <span style="position:absolute;width:7px;height:7px;border-radius:50%;background:#3a3835;top:0.5px;left:1px;transition:transform 0.2s,background 0.2s;" id="notes-follow-knob"></span>
      </span>
      <span style="font-size:6px;color:#3a3835;letter-spacing:0.1em;white-space:nowrap;">FOLLOW</span>
    </label>
    <span id="notes-popout-saved" style="font-size:6px;color:var(--term-green-glo);letter-spacing:0.12em;opacity:0;transition:opacity 0.3s;flex-shrink:0;margin-right:6px;">✓ SAVED</span>
    <button id="notes-popout-close" style="background:transparent;border:none;color:#3a3835;font-size:13px;cursor:pointer;padding:0 2px;font-family:var(--font);transition:color 0.1s;">✕</button>
  </div>
  <div id="notes-popout-body">
    <textarea id="notes-popout-textarea" placeholder="Extended notes and observations...&#10;All data persists locally."></textarea>
  </div>
  <div id="notes-popout-footer">
    <button class="npop2-btn accent" id="notes-popout-save">SAVE NOTES</button>
    <button class="npop2-btn muted" id="notes-popout-dismiss">CLOSE</button>
  </div>
</div>

<!-- ═══ CANVAS ═══ -->
<div id="canvas-container">
  <canvas id="grid-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></canvas>
  <svg id="chart" style="position:relative;z-index:1;">
    <defs>
      <filter id="glow-white"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-sage"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-cyan"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-amber"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-rose"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-navy"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-plum"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-rust"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-lime"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-gold"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-steel"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-crim"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-olive"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-slate"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-coral"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-indigo" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="urgent-blur" x="-150%" y="-150%" width="500%" height="500%">
        <feGaussianBlur stdDeviation="22"/>
      </filter>
    </defs>
    <g id="main-group">
      <g id="urgentglow-layer"></g>
      <g id="glow-layer"></g>
      <g id="links-layer"></g>
      <g id="connect-wire-layer"></g>
      <g id="nodes-layer"></g>
      <g id="ripple-layer"></g>
    </g>
  </svg>
</div>

<!-- ═══ NODE TOOLBAR ═══ -->
<div id="node-toolbar">
  <div id="node-toolbar-inner">
    <div id="ntb-label" title="Tap to rename">
      <div id="ntb-label-name">—</div>
      <div id="ntb-label-sub">TAP TO RENAME</div>
    </div>
    <button class="ntb-btn add"   id="ntb-add">
      <span class="ntb-icon">✦</span>
      <span class="ntb-text">Add Child</span>
    </button>
    <button class="ntb-btn link"  id="ntb-connect">
      <span class="ntb-icon">⟷</span>
      <span class="ntb-text">Connect</span>
    </button>
    <button class="ntb-btn notes" id="ntb-notes">
      <span class="ntb-icon">☰</span>
      <span class="ntb-text">Details</span>
    </button>
    <button class="ntb-btn del"   id="ntb-del">
      <span class="ntb-icon">✕</span>
      <span class="ntb-text">Delete</span>
    </button>
  </div>
</div>

<!-- ═══ CONTEXT MENU ═══ -->
<div id="context-menu">
  <div class="ctx-header" id="ctx-title">// NODE OPTIONS</div>
  <div class="ctx-item" id="ctx-add-child"><span class="ctx-icon">✦</span> Add Child Node</div>
  <div class="ctx-item connect-action" id="ctx-connect"><span class="ctx-icon">⟷</span> Connect to…</div>
  <div class="ctx-item" id="ctx-edit-label"><span class="ctx-icon">✎</span> Edit Label</div>
  <div class="ctx-item" id="ctx-open-notes"><span class="ctx-icon">☰</span> Open Notes</div>
  <div class="ctx-item ctx-sep destructive" id="ctx-delete"><span class="ctx-icon">✕</span> Delete Node</div>
</div>

<!-- ═══ TOOL CLUSTER BOTTOM LEFT ═══ -->
<div id="tool-cluster-left">
  <button class="tool-cluster-btn" id="tcleft-connect" title="Connect [C]">
    <span>⟷</span><span class="tc-key">C</span>
  </button>
  <button class="tool-cluster-btn" id="tcleft-unlink" title="Unlink [U]">
    <span>⌀</span><span class="tc-key">U</span>
  </button>
  <button class="tool-cluster-btn" id="tcleft-add" title="Add Node [A]">
    <span>✦</span>
    <span class="tc-key">ADD</span>
  </button>
</div>

<!-- ═══ ZOOM ═══ -->
<div id="zoom-controls">
  <button class="zoom-btn" id="btn-zoom-in">+</button>
  <button class="zoom-btn" id="btn-zoom-out">−</button>
</div>


<!-- ═══ NOTES MODAL ═══ -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <div id="modal-header-info">
        <div id="modal-node-label">NODE</div>
        <div id="modal-node-meta">Record ID: <span id="modal-node-id">—</span> · BRAINBUG MIND MAPPING SYSTEM</div>
      </div>
      <button class="modal-close-btn" id="modal-close-btn">CLOSE [ESC]</button>
    </div>
    <div id="modal-body">

      <!-- ROW 1: Name + Tags side by side -->
      <div id="modal-row-top">
        <div id="modal-name-col">
          <div class="modal-section-label">NODE NAME</div>
          <input type="text" id="modal-node-name-input" placeholder="NODE NAME" autocomplete="off">
        </div>
        <div id="modal-tags-col">
          <div class="modal-section-label">TAGS</div>
          <div class="tag-toggles">
            <button class="tag-toggle urgent"   id="tag-urgent"   type="button"><span class="tag-toggle-dot"></span> URGENT</button>
            <button class="tag-toggle review"   id="tag-review"   type="button"><span class="tag-toggle-dot"></span> REVIEW</button>
            <button class="tag-toggle personal" id="tag-personal" type="button"><span class="tag-toggle-dot"></span> PERSONAL</button>
          </div>
        </div>
      </div>

      <!-- DATE ROW (compact, under name/tags) -->
      <div id="modal-date-row">
        <span class="modal-section-label" style="margin:0;border:none;padding:0;">DUE DATE</span>
        <input type="date" id="modal-date">
        <button id="modal-date-clear">CLEAR</button>
      </div>

      <!-- SIZE + COLOR: side by side compact buttons that open popups -->
      <div id="modal-sc-row">

        <!-- SIZE button -->
        <div class="modal-sc-cell" id="modal-size-cell">
          <button class="modal-sc-btn" id="modal-size-btn" type="button">
            <span class="modal-sc-icon">⊡</span>
            <span class="modal-sc-label">NODE SIZE</span>
            <span id="modal-size-preview" class="modal-sc-value">1.0×</span>
            <span class="modal-sc-arrow">▾</span>
          </button>
          <!-- SIZE POPUP -->
          <div class="modal-sc-popup" id="modal-size-popup">
            <div class="modal-sc-popup-title">NODE SIZE</div>
            <div id="size-slider-row">
              <input type="range" id="node-size-slider" min="0.5" max="3.0" step="0.05" value="1.0">
              <span id="size-val">1.0×</span>
            </div>
          </div>
        </div>

        <!-- COLOR button -->
        <div class="modal-sc-cell" id="modal-color-cell">
          <button class="modal-sc-btn" id="modal-color-btn" type="button">
            <span id="modal-color-preview" class="modal-sc-colordot"></span>
            <span class="modal-sc-label">NODE COLOR</span>
            <span class="modal-sc-arrow">▾</span>
          </button>
          <!-- COLOR POPUP -->
          <div class="modal-sc-popup" id="modal-color-popup">
            <div class="modal-sc-popup-title">NODE COLOR</div>
            <div id="modal-color-row"></div>
          </div>
        </div>

      </div>

      <!-- NOTES -->
      <div id="modal-notes-section">
        <div class="modal-section-label" style="display:flex;align-items:center;">HIDDEN NOTES <button id="modal-notes-popout-btn" type="button">⇥ POP OUT</button></div>
        <textarea id="modal-notes" placeholder="Extended notes and observations for this node.&#10;All data persists locally. Nothing leaves this terminal."></textarea>
      </div>

    </div>
    <div id="modal-footer">
      <span id="modal-saved-indicator">✓ RECORD SAVED</span>
      <div class="spacer"></div>
      <button class="mfooter-btn danger" id="modal-delete-btn">DELETE NODE</button>
      <button class="mfooter-btn accent" id="modal-save-btn">SAVE [CTRL+S]</button>
    </div>
  </div>
</div>

<!-- ═══ STATUS BAR (hidden on mobile — kept for JS compatibility) ═══ -->
<div id="statusbar" style="display:none!important">
  <div class="status-item"><span class="status-key">NODES</span><span class="status-val" id="st-nodes">0</span></div>
  <div class="status-item"><span class="status-key">SELECTED</span><span class="status-val lit" id="st-selected">—</span></div>
  <div class="status-item"><span class="status-key">ZOOM</span><span class="status-val" id="st-zoom">100%</span></div>
  <div class="status-item"><span class="status-key">SIM</span><span class="status-val dim" id="st-sim">IDLE</span></div>
  <div class="status-item"><span class="status-key">MODE</span><span class="status-val" id="st-mode">NAV</span></div>

/* ═══════════════════════════════════════
   UNDO / REDO HISTORY
   ═══════════════════════════════════════ */
const UNDO_MAX = 40;
const _undoStack = [];
const _redoStack = [];

function updateUndoRedoBtns() {
  const uBtn = document.getElementById('btn-undo');
  const rBtn = document.getElementById('btn-redo');
  if (uBtn) { uBtn.style.opacity = _undoStack.length ? '1' : '0.35'; uBtn.style.pointerEvents = _undoStack.length ? 'all' : 'none'; }
  if (rBtn) { rBtn.style.opacity = _redoStack.length ? '1' : '0.35'; rBtn.style.pointerEvents = _redoStack.length ? 'all' : 'none'; }
}

function snapshotForUndo() {
  const snap = {
    nodes: state.nodes.map(n => ({ ...n, tags: [...(n.tags||[])] })),
    links: state.links.map(l => ({ source: nodeId(l.source), target: nodeId(l.target) })),
    nextId: state.nextId,
  };
  _undoStack.push(JSON.stringify(snap));
  if (_undoStack.length > UNDO_MAX) _undoStack.shift();
  _redoStack.length = 0; // clear redo on new action
  updateUndoRedoBtns();
}

function performUndo() {
  if (!_undoStack.length) return;
  // Push current state to redo
  const cur = {
    nodes: state.nodes.map(n => ({ ...n, tags: [...(n.tags||[])] })),
    links: state.links.map(l => ({ source: nodeId(l.source), target: nodeId(l.target) })),
    nextId: state.nextId,
  };
  _redoStack.push(JSON.stringify(cur));
  const raw = _undoStack.pop();
  const snap = JSON.parse(raw);
  state.nodes = snap.nodes.map(n => ({ ...n, fx: null, fy: null }));
  state.links = snap.links;
  state.nextId = snap.nextId;
  updateUndoRedoBtns();
  saveState(); restart();
  flash('↩ UNDO — STATE RESTORED');
}

function performRedo() {
  if (!_redoStack.length) return;
  const cur = {
    nodes: state.nodes.map(n => ({ ...n, tags: [...(n.tags||[])] })),
    links: state.links.map(l => ({ source: nodeId(l.source), target: nodeId(l.target) })),
    nextId: state.nextId,
  };
  _undoStack.push(JSON.stringify(cur));
  const raw = _redoStack.pop();
  const snap = JSON.parse(raw);
  state.nodes = snap.nodes.map(n => ({ ...n, fx: null, fy: null }));
  state.links = snap.links;
  state.nextId = snap.nextId;
  updateUndoRedoBtns();
  saveState(); restart();
  flash('↪ REDO — STATE RESTORED');
}

    nextId: state.nextId, transform: state.transform,

  try { localStorage.setItem(STORE_KEY, JSON.stringify(snap)); }

}

function loadState() {

/* ═══════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════ */
function nodeId(n) { return typeof n==='object' ? n.id : n; }
function byId(id)  { return state.nodes.find(n=>n.id===id); }
function colDef(k) { return CFG.colors.find(c=>c.key===k)||CFG.colors[0]; }
function hasTag(n, tag) { return (n.tags||[]).map(t=>t.toUpperCase()).includes(tag.toUpperCase()); }
function nodeDims(n) {
  if (n.isRoot) {
    const s = n.scale ?? 1.0;
    return { w: CFG.rootNodeW * s, h: CFG.rootNodeH * s };
  }
  const s = n.scale ?? 1.0;
  return { w: CFG.baseNodeW * s, h: CFG.baseNodeH * s };
}
function getCollideRadius(n) {
  const {w,h} = nodeDims(n); return Math.sqrt(w*w+h*h)/2 + 10;
}
function hexToRgb(hex) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return m ? { r:parseInt(m[1],16), g:parseInt(m[2],16), b:parseInt(m[3],16) } : null;
}
function linkExists(aId, bId) {
  return state.links.some(l =>
    (nodeId(l.source)===aId && nodeId(l.target)===bId) ||
    (nodeId(l.source)===bId && nodeId(l.target)===aId)
  );
}

/* ═══════════════════════════════════════
   CHAIN TRAVERSAL
   ═══════════════════════════════════════ */
function getFullChain(startId) {
  const visited = new Map(); // id -> depth
  const queue = [[startId, 0]];
  const parentMap = {};
  while (queue.length > 0) {
    const [id, depth] = queue.shift();
    if (visited.has(id)) continue;
    visited.set(id, depth);
    state.links.forEach(l => {
      const s = nodeId(l.source), t = nodeId(l.target);
      if (s === id && !visited.has(t)) { parentMap[t] = id; queue.push([t, depth+1]); }
      if (t === id && !visited.has(s)) { parentMap[s] = id; queue.push([s, depth+1]); }
    });
  }
  return [...visited.entries()].map(([id, depth]) => ({ node: byId(id), depth, parentId: parentMap[id]??null })).filter(e=>e.node);
}

function distillChainNotes(chainEntries) {
  const lines = [];
  chainEntries.forEach(({node}) => {
    if (node.notes && node.notes.trim()) {
      const firstLine = node.notes.trim().split('\n')[0].slice(0, 80);
      lines.push(`[${node.label}] ${firstLine}`);
    }
  });
  return lines;
}

function isConnectedToTree(testId) {
  const rootNode = state.nodes.find(n => n.isRoot);
  if (!rootNode) return false;
  if (testId === rootNode.id) return true;
  const visited = new Set();
  const queue = [rootNode.id];
  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur === testId) return true;
    if (visited.has(cur)) continue;
    visited.add(cur);
    state.links.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (s === cur && !visited.has(t)) queue.push(t);
      if (t === cur && !visited.has(s)) queue.push(s);
    });
  }
  return false;
}

/* ═══════════════════════════════════════

   ═══════════════════════════════════════ */
function addNode(parentId, label) {
  snapshotForUndo();
  const parent = byId(parentId);
  const id = state.nextId++;
  const ang = Math.random()*Math.PI*2;
  const dist = CFG.linkDistance * 1.1;
  const node = {
    id, label: label||`NODE_${id}`,
    x: (parent?.x ?? window.innerWidth/2)  + Math.cos(ang)*dist,
    y: (parent?.y ?? window.innerHeight/2) + Math.sin(ang)*dist,
    isRoot:false, notes:'', tags:[], colorKey:'sage', scale:1.0, dueDate:null,
  };
  state.nodes.push(node);
  if (parentId != null) state.links.push({ source:parentId, target:id });
  saveState(); restart(); select(id);
  // Immediately open inline edit so user types the name
  setTimeout(() => { const nd = byId(id); if (nd) startEdit(nd); }, 120);
  return id;
}

function deleteNode(id) {
  if (state.nodes.length <= 1) { flash('⚠ CANNOT DELETE LAST NODE'); return; }
  const n = byId(id);
  if (n?.isRoot) { flash('⚠ CANNOT DELETE ROOT NODE'); return; }
  snapshotForUndo();
  state.nodes = state.nodes.filter(n => n.id !== id);
  state.links = state.links.filter(l => nodeId(l.source)!==id && nodeId(l.target)!==id);
  if (state.selectedId === id) state.selectedId = null;
  if (state.connectSourceId === id) exitConnectMode();
  delete _idxOpenState[id];
  saveState(); restart(); flash(`NODE ${id} DELETED`);
}

function select(id) {
  state.selectedId = id;
  applySelectionStyles(); highlightLinks(); updateStatus(); updateNodeToolbar(); updateGlowEl();
  if (state.connectMode) applyConnectStyles();
  if (typeof onSelectionChange_popout === 'function') onSelectionChange_popout(id);
}

/* ═══════════════════════════════════════
   SIMULATION
   ═══════════════════════════════════════ */
function _buildRootOrbitForce() {
  const root = state.nodes.find(n => n.isRoot);
  if (!root) return null;
  const { childrenOf } = buildTreeMaps();
  const directChildIds = new Set(childrenOf[root.id] || []);
  if (!directChildIds.size) return null;
  const r = state.rootOrbitRadius ?? 220;
  const cx = root.x ?? window.innerWidth/2;
  const cy = root.y ?? (window.innerHeight-74)/2;
  return d3.forceRadial(r, cx, cy)
    .strength(nd => directChildIds.has(nd.id) ? 0.10 : 0);
}

function applyRootOrbitForce() {
  if (!simulation) return;
  simulation.force('rootOrbit', _buildRootOrbitForce());
}

function initSim() {
  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d=>d.id).distance(CFG.linkDistance).strength(CFG.linkStrength))
    .force('charge', d3.forceManyBody().strength(CFG.chargeStrength).distanceMax(380))
    .force('collide', d3.forceCollide().radius(d=>getCollideRadius(d)).strength(CFG.collideStrength).iterations(2))
    .force('cx', d3.forceX().strength(CFG.centerStrength))
    .force('cy', d3.forceY().strength(CFG.centerStrength))
    .force('rootOrbit', null)
    .alphaDecay(CFG.alphaDecay)
    .alphaMin(CFG.alphaMin)
    .velocityDecay(CFG.velocityDecay)
    .on('tick', onTick)
    .on('end', () => {
      simState('IDLE', false);
      // Mute gravity to zero after sim settles so user layout persists
      if (simulation) {
        simulation.force('cx').strength(0);
        simulation.force('cy').strength(0);
        simulation.force('rootOrbit', null);
      }
    });
  simulation.alphaTarget(CFG.collideAlphaFloor).restart();
}

function restart() {
  simState('ACTIVE', true);
  simulation.nodes(state.nodes);
  simulation.force('link').links(state.links);
  // Brief center pull only for initial layout burst
  simulation.force('cx').x(window.innerWidth/2).strength(CFG.centerStrength);
  simulation.force('cy').y(window.innerHeight/2).strength(CFG.centerStrength);
  applyRootOrbitForce();
  renderAll();
  simulation.alphaTarget(CFG.collideAlphaFloor).alpha(0.38).restart();
  updateStatus();
}

function simState(label, active) {
  const el = document.getElementById('st-sim');
  el.textContent = label;
  el.className = active ? 'status-val lit' : 'status-val dim';
}

/* ═══════════════════════════════════════
   DRIFT
   ═══════════════════════════════════════ */
function startDrift() {
  stopDrift();
  driftHandle = setInterval(() => {
    if (dragging) return;
    state.nodes.forEach(n => {
      const ang = Math.random()*Math.PI*2;
      n.vx = (n.vx||0) + Math.cos(ang)*CFG.driftMaxVel*Math.random();
      n.vy = (n.vy||0) + Math.sin(ang)*CFG.driftMaxVel*Math.random();
    });
    simulation.alphaTarget(CFG.collideAlphaFloor).alpha(Math.max(simulation.alpha(), CFG.driftAlpha)).restart();
  }, CFG.driftInterval);
}
function stopDrift() { if(driftHandle){clearInterval(driftHandle);driftHandle=null;} }

/* ═══════════════════════════════════════
   ROOT NODE ENERGY GLOW
   (defined here so svgEl/glowLayer/urgentGlowLayer are in scope)
   ═══════════════════════════════════════ */
let _rootGlowEl = null;
let _rootGlowAnimId = null;
let _rootGlowPhase = 0;

function initRootGlow() {
  // Only init once
  if (_rootGlowAnimId) return;

  const rootGradId = 'root-energy-gradient';
  const defs = d3.select(svgEl).select('defs');
  // Create gradient
  const g = defs.append('radialGradient')
    .attr('id', rootGradId).attr('cx','50%').attr('cy','50%').attr('r','50%');
  g.append('stop').attr('offset','0%')  .attr('stop-color','#d0ccbe').attr('stop-opacity','0.40');
  g.append('stop').attr('offset','35%') .attr('stop-color','#b8b4aa').attr('stop-opacity','0.20');
  g.append('stop').attr('offset','70%') .attr('stop-color','#a0a098').attr('stop-opacity','0.07');
  g.append('stop').attr('offset','100%').attr('stop-color','#888880').attr('stop-opacity','0');

  // Append ellipse to urgentGlowLayer (below links+nodes in z-order)
  _rootGlowEl = d3.select(urgentGlowLayer).append('ellipse')
    .attr('class','root-energy-glow')
    .attr('fill', `url(#${rootGradId})`)
    .attr('pointer-events','none');

  function tick() {
    _rootGlowAnimId = requestAnimationFrame(tick);
    const rootNode = state.nodes.find(n => n.isRoot);
    if (!rootNode || !_rootGlowEl) return;
    _rootGlowPhase += 0.018;
    const {w,h} = nodeDims(rootNode);
    const baseRx = Math.max(w, h) * 1.6 + 55;
    const baseRy = baseRx * 0.62;
    const pulse  = 1 + 0.10 * Math.sin(_rootGlowPhase);
    const pulse2 = 1 + 0.07 * Math.sin(_rootGlowPhase * 1.7 + 1.2);
    _rootGlowEl
      .attr('cx', rootNode.x ?? 0)
      .attr('cy', rootNode.y ?? 0)
      .attr('rx', baseRx * pulse)
      .attr('ry', baseRy * pulse2)
      .attr('opacity', 0.70 + 0.30 * Math.sin(_rootGlowPhase * 0.9));
  }
  tick();
}

/* ═══════════════════════════════════════
   GRID
   ═══════════════════════════════════════ */
function drawGrid() {
  const cr = document.getElementById('canvas-container').getBoundingClientRect();
  const W = cr.width, H = cr.height;
  gridCanvas.width = W; gridCanvas.height = H;
  const ctx = gridCanvas.getContext('2d');
  ctx.fillStyle = darkMode ? '#16181a' : '#f5f2ec';
  ctx.fillRect(0, 0, W, H);
  const tr = state.transform, spacing = 32;
  const dotR = Math.max(0.5, Math.min(2.0, 0.9 * tr.k));
  const worldLeft   = -tr.x / tr.k,      worldTop    = -tr.y / tr.k;
  const worldRight  = (W - tr.x) / tr.k, worldBottom = (H - tr.y) / tr.k;
  const startCol = Math.floor(worldLeft/spacing),  endCol = Math.ceil(worldRight/spacing);
  const startRow = Math.floor(worldTop/spacing),   endRow = Math.ceil(worldBottom/spacing);
  ctx.fillStyle = darkMode ? '#2a2e2a' : '#d0cabb';
  for (let col=startCol; col<=endCol; col++) {
    for (let row=startRow; row<=endRow; row++) {
      const sx = col*spacing*tr.k + tr.x;
      const sy = row*spacing*tr.k + tr.y;
      ctx.beginPath();
      ctx.arc(sx, sy, dotR, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function updateGlowEl() {
  if (glowEl) { glowEl.remove(); glowEl = null; }
  if (!state.selectedId) return;
  const nd = byId(state.selectedId); if (!nd) return;
  const col = nd.isRoot ? { stroke:'#888880' } : colDef(nd.colorKey);

  const {w,h} = nodeDims(nd);
  const r = Math.max(w,h) * 1.7 + 36;
  const gradId = `sel-grad-${state.selectedId}`;
  const defs = d3.select(svgEl).select('defs');
  defs.select(`#${gradId}`).remove();
  const grad = defs.append('radialGradient').attr('id',gradId).attr('cx','50%').attr('cy','50%').attr('r','50%');
  grad.append('stop').attr('offset','0%').attr('stop-color',`rgb(${rgb.r},${rgb.g},${rgb.b})`).attr('stop-opacity',0.22);
  grad.append('stop').attr('offset','55%').attr('stop-color',`rgb(${rgb.r},${rgb.g},${rgb.b})`).attr('stop-opacity',0.07);
  grad.append('stop').attr('offset','100%').attr('stop-color',`rgb(${rgb.r},${rgb.g},${rgb.b})`).attr('stop-opacity',0);
  glowEl = d3.select(glowLayer).append('ellipse').attr('class','sel-glow')
    .attr('cx',nd.x).attr('cy',nd.y).attr('rx',r).attr('ry',r*0.65)
    .attr('fill',`url(#${gradId})`);
}

      ...baseCol,

    g.select('.node-cross')
      .text(d.isRoot ? '✝' : '')
      .attr('y', -h/2 - 11)
      .style('fill', '#888880')
      .style('display', d.isRoot ? null : 'none');

    const fontSize = d.isRoot ? 14 : Math.max(9, 12 * (d.scale??1.0));
    g.select('.node-label').text(d.label).attr('font-size', fontSize).style('fill', col.text);
    g.select('.node-id').attr('x', w/2 - 5).attr('y', -h/2 + 9).style('fill', col.stroke).text(`#${d.id}`);

    const hasNotes = d.notes?.trim().length > 0;
    g.select('.node-note-dot').attr('cx', w/2-8).attr('cy', h/2-8)
      .style('fill', col.stroke).style('opacity', hasNotes ? 0.8 : 0);

    const hasDate = !!d.dueDate;
    g.select('.node-date-dot').attr('cx', -w/2+8).attr('cy', h/2-8)
      .style('fill', '#ccaa00').style('opacity', hasDate ? 0.9 : 0);

  all.classed('connect-source', d => state.connectMode && d.id === state.connectSourceId);
  all.classed('connect-eligible', d => state.connectMode && d.id !== state.connectSourceId && !linkExists(state.connectSourceId, d.id));

function renderUrgentGlows() {
  const urgentNodes = state.nodes.filter(n => hasTag(n,'URGENT'));
  const defs = d3.select(svgEl).select('defs');

  urgentNodes.forEach(d => {
    const gid = `urg-grad-${d.id}`;
    if (defs.select(`#${gid}`).empty()) {
      const g = defs.append('radialGradient').attr('id',gid).attr('cx','50%').attr('cy','50%').attr('r','50%');
      g.append('stop').attr('offset','0%').attr('stop-color','#cc1111').attr('stop-opacity','0.26');
      g.append('stop').attr('offset','50%').attr('stop-color','#cc1111').attr('stop-opacity','0.09');
      g.append('stop').attr('offset','100%').attr('stop-color','#cc1111').attr('stop-opacity','0');
    }
  });

  d3.select(urgentGlowLayer).selectAll('circle.urgent-halo')
    .data(urgentNodes, d=>d.id).exit().each(function(d){
      defs.select(`#urg-grad-${d.id}`).remove();
    }).remove();

  const sel = d3.select(urgentGlowLayer).selectAll('circle.urgent-halo').data(urgentNodes, d=>d.id);
  const enter = sel.enter().append('circle').attr('class','urgent-halo').attr('filter','url(#urgent-blur)');

  enter.each(function() {
    const el = d3.select(this);
    el.append('animate')
      .attr('attributeName','opacity').attr('values','0.55;0.88;0.55')
      .attr('dur','2.8s').attr('repeatCount','indefinite').attr('calcMode','ease');

      .attr('attributeName','r')
      .attr('values', function(d) {
        const {w,h}=nodeDims(d), base=Math.max(w,h)*0.78+26;
        return `${base};${base+18};${base}`;
      })
      .attr('dur','2.8s').attr('repeatCount','indefinite').attr('calcMode','ease');

  sel.merge(enter).each(function(d) {

      .attr('r', Math.max(w,h)*0.78+26)
      .style('fill', `url(#urg-grad-${d.id})`);

/* ═══════════════════════════════════════
   RIPPLE
   ═══════════════════════════════════════ */
function spawnRipple(nd) {
  const col = nd.isRoot ? '#888880' : colDef(nd.colorKey).stroke;
  const layer = d3.select(ripLayer);
  const rings = [];
  const t0 = performance.now();
  for (let i=0; i<CFG.rippleRings; i++) {
    rings.push({
      el: layer.append('circle').attr('class','ripple-ring')
        .attr('cx',nd.x).attr('cy',nd.y).attr('r',0)
        .style('stroke',col).style('stroke-width','1px'),
      delay: i * CFG.rippleDelay,
    });
  }
  (function tick(now) {
    const elapsed = now - t0; let alive = false;
    rings.forEach(r => {
      const t = elapsed - r.delay; if (t<0) { alive=true; return; }
      const p = Math.min(t/CFG.rippleDur, 1);
      r.el.attr('r', p*CFG.rippleMaxR).style('opacity', (1-p)*0.55);
      if (p<1) alive = true;
    });
    if (alive) requestAnimationFrame(tick);
    else rings.forEach(r=>r.el.remove());
  })(t0);
}

/* ═══════════════════════════════════════
   ZOOM & PAN
   ═══════════════════════════════════════ */
function initZoom() {
  svgZoom = d3.zoom().scaleExtent([0.06, 6])
    .on('zoom', event => {
      const t = event.transform;
      d3.select('#main-group').attr('transform', `translate(${t.x},${t.y}) scale(${t.k})`);
      state.transform = { x:t.x, y:t.y, k:t.k };
      document.getElementById('st-zoom').textContent = Math.round(t.k*100) + '%';
      drawGrid();
      drawMinimap();
      updateGlowPos();
    });
  d3.select(svgEl).call(svgZoom);
  // Disable D3's built-in dblclick-to-zoom — we handle dblclick ourselves on nodes
  d3.select(svgEl).on('dblclick.zoom', null);
  // Track mouse for connect wire
  d3.select(svgEl).on('mousemove.connectwire', function(event) {
    if (!state.connectMode) return;
    const [mx, my] = d3.pointer(event, document.getElementById('main-group'));
    updateConnectWire(mx, my);
  });
  const tr = state.transform;
  d3.select(svgEl).call(svgZoom.transform, d3.zoomIdentity.translate(tr.x, tr.y).scale(tr.k));
}

function resetView() {
  d3.select(svgEl).transition().duration(700).ease(d3.easeCubicInOut)
    .call(svgZoom.transform, d3.zoomIdentity);
}

/* ═══════════════════════════════════════
   DRAG
   ═══════════════════════════════════════ */
let dragging = false, dragMoved = false;

function onDragStart(event, d) {
  dragging = true; dragMoved = false;
  if (!event.active) {
    // Larger nodes cause less global disturbance
    const scale = d.scale ?? 1.0;
    const dragAlpha = Math.max(0.08, 0.22 - (scale - 1.0) * 0.08);
    simulation.alphaTarget(dragAlpha).restart();
  }
  d.fx = d.x; d.fy = d.y;
  simState('ACTIVE', true);
}
function onDragged(event, d) {
  dragMoved = true;
  d.fx = event.x; d.fy = event.y;
}
function onDragEnd(event, d) {
  dragging = false;
  d.fx = null; d.fy = null;
  if (!event.active) simulation.alphaTarget(CFG.collideAlphaFloor);
  saveState();
}

/* ═══════════════════════════════════════
   CLICK / DBLCLICK / CONTEXT
   ═══════════════════════════════════════ */
let editingId = null;
let _dblClickTimer = null;
let _lastClickNodeId = null;
const DBL_CLICK_MS = 280;

function onNodeMouseDown(event, d) {
  if (event.button !== 0) return;
  if (!dragMoved) spawnRipple(d);
}

function onNodeClick(event, d) {
  event.stopPropagation();
  hideCtxMenu();
  if (dragMoved) { dragMoved = false; return; }

  // ── CONNECT PICK MODE (no node was selected when link btn was clicked) ──
  if (connectPickMode) {
    connectPickMode = false;
    document.getElementById('tcleft-connect').classList.remove('connect-active');
    select(d.id);
    enterConnectMode(d.id);
    renderConnectWire();
    return;
  }

  // ── UNLINK MODE ──
  if (state.unlinkMode) {
    if (!state.unlinkFirstId) {
      state.unlinkFirstId = d.id;
      select(d.id);
      d3.select(nodesLayer).selectAll('g.node').each(function(nd) {
        const g = d3.select(this);
        g.classed('connect-source', nd.id === d.id);
        g.classed('connect-eligible', nd.id !== d.id && linkExists(d.id, nd.id));
      });
      flash(`⌀ FIRST NODE: "${d.label}" — NOW CLICK A CONNECTED NODE TO UNLINK`, true);
    } else {
      const firstId = state.unlinkFirstId;
      if (d.id === firstId) {
        state.unlinkFirstId = null;
        d3.select(nodesLayer).selectAll('g.node').classed('connect-source', false).classed('connect-eligible', false);
        flash('⌀ UNLINK MODE — CLICK FIRST NODE · [ESC] CANCEL', true);
        return;
      }
      if (!linkExists(firstId, d.id)) { flash('⌀ NO LINK EXISTS BETWEEN THESE NODES'); return; }
      snapshotForUndo();
      const before = state.links.length;
      state.links = state.links.filter(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return !((s === firstId && t === d.id) || (s === d.id && t === firstId));
      });
      if (state.links.length < before) {
        flash(`⌀ UNLINKED: ${byId(firstId)?.label} ↔ ${d.label}`);
        saveState(); restart(); exitUnlinkMode();
        setTimeout(() => {
          if (!isConnectedToTree(d.id)) checkOrphan(d.id);
          else if (!isConnectedToTree(firstId)) checkOrphan(firstId);
        }, 300);
      }
    }
    return;
  }

  // ── CONNECT MODE ──
  if (event.shiftKey || state.connectMode) {
    if (!state.connectMode) {
      enterConnectMode(d.id); select(d.id); renderConnectWire();
    } else {
      if (d.id === state.connectSourceId) { exitConnectMode(); flash('CONNECTION CANCELLED'); }
      else { connectNodes(state.connectSourceId, d.id); exitConnectMode(); }
    }
    return;
  }

  // ── DOUBLE-CLICK DETECTION (timing-based, avoids D3 zoom conflicts) ──
  if (_dblClickTimer && _lastClickNodeId === d.id) {
    clearTimeout(_dblClickTimer);
    _dblClickTimer = null;
    _lastClickNodeId = null;
    // Double-click confirmed → open details modal
    commitEdit();
    openModal(d.id);
    return;
  }
  // First click of a potential double-click
  _lastClickNodeId = d.id;
  _dblClickTimer = setTimeout(() => {
    _dblClickTimer = null;
    _lastClickNodeId = null;
  }, DBL_CLICK_MS);

  // Single click: select
  select(d.id);
}
function onNodeCtx(event, d) {
  event.preventDefault(); event.stopPropagation();
  select(d.id); spawnRipple(d);
  showCtxMenu(event.clientX, event.clientY, d);
}

function startEdit(d) {
  commitEdit();
  editingId = d.id;
  const g = d3.select(nodesLayer).selectAll('g.node').filter(n => n.id === d.id);
  const {w,h} = nodeDims(d);
  const col = d.isRoot ? '#1a1814' : colDef(d.colorKey).text;
  const fontSize = d.isRoot ? 14 : Math.max(9, 12*(d.scale??1.0));
  g.select('.node-label').style('display','none');
  g.select('.edit-fo')
    .attr('x', -w/2+8).attr('y', -h/2+6)
    .attr('width', w-16).attr('height', h-12)
    .style('display', null);
  const inp = g.select('.edit-fo input').node();
  inp.value = d.label;
  inp.style.color = col;
  inp.style.borderBottomColor = col;
  inp.style.fontSize = fontSize+'px';
  inp.focus(); inp.select();
  inp.onkeydown = e => {
    e.stopPropagation();
    if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); commitEdit(); }
  };
  inp.onblur = () => commitEdit();
}

function commitEdit() {
  if (editingId == null) return;
  const d = byId(editingId); if (!d) { editingId = null; return; }
  const g = d3.select(nodesLayer).selectAll('g.node').filter(n => n.id === editingId);
  const inp = g.select('.edit-fo input').node();
  if (inp) {
    const v = inp.value.trim().toUpperCase();
    if (v && v !== d.label) { snapshotForUndo(); d.label = v; }
  }
  g.select('.node-label').style('display',null).text(d.label);
  g.select('.edit-fo').style('display','none');
  editingId = null;
  saveState(); refreshIndex();
}

/* ═══════════════════════════════════════
   INDEX (tree hierarchy + connection bar)
   ═══════════════════════════════════════ */
const TAG_COLORS = { URGENT:'#cc2222', REVIEW:'#ddaa00', PERSONAL:'#44aa44' };

function getDirectNeighbors(id) {
  return state.links
    .filter(l => nodeId(l.source)===id || nodeId(l.target)===id)
    .map(l => {
      const nid = nodeId(l.source)===id ? nodeId(l.target) : nodeId(l.source);
      return byId(nid);
    })
    .filter(Boolean);
}

/* Build a BFS tree from root to classify each link as parent→child or cross/peer */
function buildTreeMaps() {
  const root = state.nodes.find(n => n.isRoot);
  if (!root) return { parentOf: {}, childrenOf: {}, peerLinks: new Set() };

  const parentOf = {};   // nodeId -> parentNodeId (in BFS tree)
  const visited  = new Set();
  const queue    = [root.id];
  visited.add(root.id);

  while (queue.length) {
    const cur = queue.shift();
    state.links.forEach(l => {
      const s = nodeId(l.source), t = nodeId(l.target);
      // Treat both directions — but only assign tree-parent once (BFS order)
      [s === cur ? t : null, t === cur ? s : null].forEach(nb => {
        if (nb && !visited.has(nb)) {
          visited.add(nb);
          parentOf[nb] = cur;
          queue.push(nb);
        }
      });
    });
  }

  // childrenOf[id] = array of ids whose parentOf[id] === id
  const childrenOf = {};
  Object.entries(parentOf).forEach(([child, parent]) => {
    if (!childrenOf[parent]) childrenOf[parent] = [];
    childrenOf[parent].push(parseInt(child));
  });

  // peerLinks = links that are NOT parent→child or child→parent in BFS tree
  const peerLinks = new Set();
  state.links.forEach(l => {
    const s = nodeId(l.source), t = nodeId(l.target);
    const isTreeEdge = parentOf[t] === s || parentOf[s] === t;
    if (!isTreeEdge) peerLinks.add(`${Math.min(s,t)}-${Math.max(s,t)}`);
  });

  return { parentOf, childrenOf, peerLinks };
}

/* ── Index open-state memory: nodeId -> boolean ── */
const _idxOpenState = {};

function buildIndex() {
  const allNodes = state.nodes.filter(n => !n.isRoot);
  document.getElementById('index-header-count').textContent =
    `${allNodes.length} NODE${allNodes.length!==1?'S':''}`;

  const rdxCards = document.getElementById('rdx-cards');
  rdxCards.innerHTML = '';

  const { childrenOf } = buildTreeMaps();

  // Root node (ME) — find its direct children (HEART, MIND, BODY)
  const rootNode   = state.nodes.find(n => n.isRoot);
  const topLevelIds = rootNode ? (childrenOf[rootNode.id] || []) : [];

  // Track which node ids are reachable from the tree (for "unlinked" section)
  const treeReached = new Set();

  const treeEl = document.createElement('div');
  treeEl.className = 'idx-tree';

  /* ── Recursive group builder ── */
  function buildGroup(nodeId, depth, ancestorSet) {
    if (ancestorSet.has(nodeId)) return null;        // cycle guard
    const node = byId(nodeId);
    if (!node || node.isRoot) return null;

    treeReached.add(nodeId);

    const cd       = colDef(node.colorKey || 'sage');
    const hasNotes = !!(node.notes && node.notes.trim());
    const tags     = node.tags || [];
    const children = (childrenOf[nodeId] || []).filter(id => !ancestorSet.has(id) && !byId(id)?.isRoot);
    const hasKids  = children.length > 0;

    // Preserve open state; default: depth-0 open, others closed
    if (_idxOpenState[nodeId] === undefined) {
      _idxOpenState[nodeId] = (depth === 0);
    }
    const isOpen = _idxOpenState[nodeId];

    const group = document.createElement('div');
    group.className = 'idx-group';

    /* ── Row ── */
    const row = document.createElement('div');
    row.className = `idx-row depth-${Math.min(depth, 4)}${isOpen ? ' open' : ''}`;
    row.dataset.id = nodeId;
    if (state.selectedId === nodeId) row.classList.add('is-selected');

    const toggleIcon = hasKids ? '▶' : '·';
    const childBadge = hasKids
      ? `<span class="idx-badge">${children.length}</span>` : '';
    const tagDots = tags.map(t =>
      `<span style="width:4px;height:4px;border-radius:50%;background:${TAG_COLORS[t.toUpperCase()]||'#888'};display:inline-block;flex-shrink:0"></span>`
    ).join('');

    row.innerHTML = `
      <span class="idx-toggle">${toggleIcon}</span>
      <span class="idx-dot" style="background:${cd.stroke}"></span>
      <span class="idx-label">${node.label}</span>
      <span class="idx-meta">
        ${tagDots}
        ${hasNotes  ? `<span style="font-size:6px;color:#4a6a4a;flex-shrink:0">✎</span>` : ''}
        ${node.dueDate ? `<span style="font-size:6px;color:#ccaa00;flex-shrink:0">◫</span>` : ''}
        ${childBadge}
      </span>`;

    group.appendChild(row);

    /* ── Children container ── */
    if (hasKids) {
      const kidContainer = document.createElement('div');
      kidContainer.className = 'idx-children' + (isOpen ? ' open' : '');

      const nextAncestors = new Set(ancestorSet);
      nextAncestors.add(nodeId);

      children.forEach(cid => {
        const cg = buildGroup(cid, depth + 1, nextAncestors);
        if (cg) kidContainer.appendChild(cg);
      });

      group.appendChild(kidContainer);

      // Toggle on row click - DON'T close panel
      row.addEventListener('click', e => {
        e.stopPropagation();
        const nowOpen = row.classList.toggle('open');
        kidContainer.classList.toggle('open', nowOpen);
        _idxOpenState[nodeId] = nowOpen;
        // Navigate without closing panel
        select(nodeId); navigateTo(node);
        rdxCards.querySelectorAll('.idx-row.is-selected').forEach(r => r.classList.remove('is-selected'));
        row.classList.add('is-selected');
        flash(`↗ ${node.label}`);
      });
    } else {
      row.addEventListener('click', e => {
        e.stopPropagation();
        select(nodeId); navigateTo(node);
        rdxCards.querySelectorAll('.idx-row.is-selected').forEach(r => r.classList.remove('is-selected'));
        row.classList.add('is-selected');
        flash(`↗ ${node.label}`);
      });
    }

    return group;
  }

  /* ── Build top-level (HEART / MIND / BODY) ── */
  if (topLevelIds.length > 0) {
    const rootAncestors = new Set(rootNode ? [rootNode.id] : []);
    topLevelIds.forEach(id => {
      const g = buildGroup(id, 0, rootAncestors);
      if (g) treeEl.appendChild(g);
    });
  }

  /* ── Fallback / Unlinked nodes ── */
  const unlinked = allNodes.filter(n => !treeReached.has(n.id));
  if (unlinked.length > 0) {
    const sep = document.createElement('div');
    sep.className = 'idx-unlinked-header';
    sep.textContent = `UNLINKED · ${unlinked.length}`;
    treeEl.appendChild(sep);

    unlinked.forEach(node => {
      const g = buildGroup(node.id, 0, new Set(rootNode ? [rootNode.id] : []));
      if (g) treeEl.appendChild(g);
    });
  }

  rdxCards.appendChild(treeEl);
}

/* Build one indented tree row for a neighbor node */
function buildTreeRowHTML(nd, depth, role, isLast) {
  const nc   = colDef(nd.colorKey||'sage');
  const tags = (nd.tags||[]).map(t =>
    `<span style="width:3px;height:3px;border-radius:50%;background:${TAG_COLORS[t.toUpperCase()]||'#888'};display:inline-block"></span>`
  ).join('');
  const indent = depth > 0
    ? `<div class="rdx-tree-guide" style="width:${depth*14}px;position:relative">
         <div class="rdx-tree-guide-line"></div>
         <div class="rdx-tree-guide-elbow"></div>
       </div>`
    : '';
  const rowClass = role === 'parent' ? 'parent-row' : role === 'child' ? 'child-row' : '';
  return `<div class="rdx-tree-row" data-tree-id="${nd.id}" style="margin-bottom:1px">
    ${indent}
    <div class="rdx-tree-node-row ${rowClass}">
      <span class="rdx-chain-dot" style="background:${nc.stroke}"></span>
      <span class="rdx-chain-name">${nd.label}</span>
      ${tags}
      ${nd.dueDate ? `<span style="font-size:5px;color:#ccaa00">◫</span>` : ''}
      ${nd.notes?.trim() ? `<span style="font-size:5px;color:#4a6a4a">✎</span>` : ''}
    </div>
  </div>`;
}

function refreshIndex() {
  if (activePanelId === 'index') buildIndex();
  if (activePanelId === 'cal')   renderCalendar();
  // Refresh notes summary if it's open
  const notesSummaryBody = document.getElementById('notes-summary-body');
  if (notesSummaryBody && notesSummaryBody.style.display !== 'none') buildNotesPanel();
  buildTicker();
}

/* ── Notes open-state memory ── */
const _ntOpenState = {};

function buildNotesPanel() {
  const nodesWithNotes = state.nodes.filter(n => !n.isRoot && n.notes && n.notes.trim());
  const count = nodesWithNotes.length;
  // Update summary toggle count
  const summaryCount = document.getElementById('notes-summary-count');
  if (summaryCount) summaryCount.textContent = `${count} WITH NOTES`;

  const container = document.getElementById('notes-tree');
  container.innerHTML = '';

  if (count === 0) {
    const empty = document.createElement('div');
    empty.className = 'nt-empty';
    empty.textContent = 'No notes written yet. Open any node\'s details to add notes.';
    container.appendChild(empty);
    return;
  }

  const { childrenOf } = buildTreeMaps();
  const rootNode = state.nodes.find(n => n.isRoot);
  const noteSet = new Set(nodesWithNotes.map(n => n.id));
  const treeReached = new Set();

  function buildNtGroup(nid, depth, ancestorSet) {
    if (ancestorSet.has(nid)) return null;
    const node = byId(nid);
    if (!node || node.isRoot) return null;

    const hasNote = noteSet.has(nid);
    const kids = (childrenOf[nid] || []).filter(id =>
      !ancestorSet.has(id) && !byId(id)?.isRoot
    );
    // Only include this node if it has notes OR has descendants with notes
    const descendantsWithNotes = (function countDescNotes(id, seen) {
      return (childrenOf[id] || []).reduce((acc, cid) => {
        if (seen.has(cid)) return acc;
        const cn = byId(cid); if (!cn || cn.isRoot) return acc;
        seen.add(cid);
        return acc + (noteSet.has(cid) ? 1 : 0) + countDescNotes(cid, seen);
      }, 0);
    })(nid, new Set(ancestorSet));

    if (!hasNote && descendantsWithNotes === 0) return null;

    treeReached.add(nid);
    const cd = colDef(node.colorKey || 'sage');

    // Default open state for notes tree
    if (_ntOpenState[nid] === undefined) _ntOpenState[nid] = depth === 0;
    const isOpen = _ntOpenState[nid];
    const hasKids = kids.length > 0 && descendantsWithNotes > 0;

    const group = document.createElement('div');
    group.className = 'nt-group';

    const row = document.createElement('div');
    row.className = `nt-row depth-${Math.min(depth,3)}${isOpen ? ' open' : ''}`;
    row.dataset.id = nid;

    const toggleChar = hasKids ? '▶' : '·';
    const preview = hasNote ? node.notes.trim().replace(/\n/g, ' ').slice(0, 60) : '— no notes —';

    row.innerHTML = `
      <span class="nt-toggle" style="cursor:pointer;padding:2px 4px;" title="Expand/collapse">${toggleChar}</span>
      <span class="nt-dot" style="background:${cd.stroke}"></span>
      <span class="nt-content" style="cursor:${hasNote ? 'pointer' : 'default'}">
        <div class="nt-label">${node.label}${hasNote ? '' : ' <span style="opacity:0.4;font-size:6px">▸ CHILD HAS NOTE</span>'}</div>
        ${hasNote ? `<div class="nt-preview">${preview}</div>` : ''}
      </span>
      ${hasNote ? `<span class="nt-detail-btn" title="Open details" style="font-size:8px;color:#3a3835;padding:2px 5px;cursor:pointer;flex-shrink:0;border:1px solid #222;margin-left:4px;transition:color 0.1s,border-color 0.1s;">→</span>` : ''}
      ${descendantsWithNotes > 0 && !hasNote ? `<span class="nt-badge">${descendantsWithNotes}</span>` : ''}`;

    group.appendChild(row);

    // Children
    if (hasKids) {
      const kidEl = document.createElement('div');
      kidEl.className = 'nt-children' + (isOpen ? ' open' : '');
      const nextAnc = new Set(ancestorSet); nextAnc.add(nid);
      kids.forEach(cid => {
        const cg = buildNtGroup(cid, depth + 1, nextAnc);
        if (cg) kidEl.appendChild(cg);
      });
      group.appendChild(kidEl);

      // Toggle: only the arrow toggles expand/collapse
      const toggleEl = row.querySelector('.nt-toggle');
      if (toggleEl) {
        toggleEl.addEventListener('click', e => {
          e.stopPropagation();
          const nowOpen = row.classList.toggle('open');
          kidEl.classList.toggle('open', nowOpen);
          _ntOpenState[nid] = nowOpen;
        });
      }

      // Label/content area: just navigate and select, don't open modal
      const contentEl = row.querySelector('.nt-content');
      if (contentEl && hasNote) {
        contentEl.addEventListener('click', e => {
          e.stopPropagation();
          select(nid); navigateTo(node);
        });
      }
    } else {
      // Leaf node: content click navigates
      const contentEl = row.querySelector('.nt-content');
      if (contentEl && hasNote) {
        contentEl.addEventListener('click', e => {
          e.stopPropagation();
          select(nid); navigateTo(node);
        });
      }
    }

    // Detail button always opens modal (separate from expand)
    const detailBtn = row.querySelector('.nt-detail-btn');
    if (detailBtn) {
      detailBtn.addEventListener('mouseenter', () => { detailBtn.style.color='#aa88ff'; detailBtn.style.borderColor='#aa88ff'; });
      detailBtn.addEventListener('mouseleave', () => { detailBtn.style.color='#3a3835'; detailBtn.style.borderColor='#222'; });
      detailBtn.addEventListener('click', e => {
        e.stopPropagation();
        select(nid); navigateTo(node); openModal(nid);
      });
    }

    // Double-click → open full details modal
    if (hasNote) {
      row.addEventListener('dblclick', e => {
        e.stopPropagation();
        select(nid); navigateTo(node); openModal(nid);
      });
    }

    return group;
  }

  // Build from top-level nodes
  const rootAncestors = new Set(rootNode ? [rootNode.id] : []);
  const topLevelIds = rootNode ? (childrenOf[rootNode.id] || []) : [];

  topLevelIds.forEach(id => {
    const g = buildNtGroup(id, 0, rootAncestors);
    if (g) container.appendChild(g);
  });

  // Unlinked nodes with notes
  const unlinked = nodesWithNotes.filter(n => !treeReached.has(n.id));
  if (unlinked.length > 0) {
    const sep = document.createElement('div');
    sep.className = 'nt-section-header';
    sep.textContent = `UNLINKED · ${unlinked.length}`;
    container.appendChild(sep);
    unlinked.forEach(node => {
      const g = buildNtGroup(node.id, 0, new Set(rootNode ? [rootNode.id] : []));
      if (g) container.appendChild(g);
    });
  }
}

  const ty = canvasH/2 - node.y * state.transform.k;
  d3.select(svgEl).transition().duration(420)
    .call(svgZoom.transform, d3.zoomIdentity.translate(tx, ty).scale(state.transform.k));
}
