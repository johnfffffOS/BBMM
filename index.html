<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>BRAINBUG — Mind Mapping System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --lumon-bg:       #f5f2ec;
  --lumon-bg2:      #ede9e1;
  --lumon-bg3:      #e2ddd5;
  --lumon-ink:      #1a1814;
  --lumon-ink2:     #3d3a34;
  --lumon-ink3:     #7a756c;
  --lumon-ink4:     #b0aa9f;
  --term-green:     #2d6a2d;
  --term-green-hi:  #3a8a3a;
  --term-green-glo: #4db84d;
  --term-green-bg:  #e8f0e8;
  --node-sage:      #4a7c59;
  --font: 'IBM Plex Mono', monospace;
  --topbar-h: 56px;
  --statusbar-h: 0px;
  /* TempleOS palette for tool dock headers */
  --temple-cyan:   #00aacc;
  --temple-yellow: #ccaa00;
  --temple-magenta:#aa0088;
  --temple-red:    #cc2200;
  --temple-lime:   #44cc00;
  --temple-gray:   #1a1c1a;
  /* Canvas/modal bg - overridden by dark mode */
  --canvas-bg: #f5f2ec;
  --modal-bg: #f5f2ec;
  --modal-bg2: #ede9e1;
  --modal-bg3: #e2ddd5;
  --modal-text: #1a1814;
  --modal-text2: #3d3a34;
  --modal-text3: #7a756c;
  --dark-mode: 0;
  --ui-scale: 1;
}
/* UI scale applied via document.documentElement.style.zoom in JS */

/* ── BINDER THEME VARIABLES ── */
:root {
  --binder-bg:               #f0ede6;
  --binder-bg2:              #e8e4dc;
  --binder-bg3:              #dedad1;
  --binder-ink:              #2a2620;
  --binder-ink2:             #5a5650;
  --binder-ink3:             #9a9690;
  --binder-border:           #d0ccc4;
  --binder-border2:          #e0ddd6;
  --binder-card-bg:          #ede9e1;
  --binder-card-expanded:    #e2ddd5;
  --binder-card-hover:       #e8e4dc;
  --binder-input-bg:         #f5f2ec;
  --binder-input-border:     #d0ccc4;
  --binder-node-color:       #3a3630;
  --binder-note-color:       #6a6660;
  --binder-id-color:         #c0bcb4;
  --binder-meta-color:       #9a9690;
  --binder-empty-color:      #b0aca4;
  --binder-section-bg:       #ede9e1;
  --binder-map-bg:           #e8e4dc;
  --binder-tab-bg:           #e2ddd5;
  --binder-tab-active-bg:    rgba(45,106,45,0.06);
  --binder-cal-day:          #3a3630;
  --binder-cal-empty:        rgba(58,54,48,0.2);
  --binder-event-label:      #5a5650;
  --binder-header-bg:        rgba(204,170,0,0.06);
}
body.dark-mode {
  --binder-bg:               #0a0c0a;
  --binder-bg2:              #080a08;
  --binder-bg3:              #060808;
  --binder-ink:              #c8c4be;
  --binder-ink2:             #8a8880;
  --binder-ink3:             #5a5855;
  --binder-border:           #141414;
  --binder-border2:          #0d0d0d;
  --binder-card-bg:          #0c0e0c;
  --binder-card-expanded:    #111414;
  --binder-card-hover:       #111411;
  --binder-input-bg:         #0a0a0a;
  --binder-input-border:     #1e1e1e;
  --binder-node-color:       #8a8880;
  --binder-note-color:       #4a4845;
  --binder-id-color:         #2e2c28;
  --binder-meta-color:       #3a3835;
  --binder-empty-color:      #2a2a2a;
  --binder-section-bg:       #060808;
  --binder-map-bg:           #080a08;
  --binder-tab-bg:           #060808;
  --binder-tab-active-bg:    rgba(77,184,77,0.04);
  --binder-cal-day:          #2e2c28;
  --binder-cal-empty:        rgba(46,44,40,0.4);
  --binder-event-label:      #7a7870;
  --binder-header-bg:        rgba(204,170,0,0.06);
}

/* ── DARK MODE ── */
body.dark-mode {
  --canvas-bg: #16181a;
  --modal-bg: #16181a;
  --modal-bg2: #111315;
  --modal-bg3: #1c1f22;
  --modal-text: #d0ccc6;
  --modal-text2: #a8a49e;
  --modal-text3: #6a6860;
  --dark-mode: 1;
}
body.dark-mode #canvas-container { background: var(--canvas-bg); }

/* Modal shell */
body.dark-mode #modal-overlay { background: rgba(0,0,0,0.82); }
body.dark-mode #modal { background: #111315; border-color: #1e1e1e; }
body.dark-mode #modal-header { background: #0c0e0f; border-color: #1a1a1a; }
body.dark-mode #modal-node-label { color: #d0ccc6 !important; }
body.dark-mode #modal-node-meta  { color: #3a3835; }
body.dark-mode #modal-body { background: #111315; }
body.dark-mode .modal-section-label { color: #4a4845; border-color: #1e1e1e; }

/* Name input */
body.dark-mode #modal-node-name-input {
  background: #0c0e0f; color: #c8c4be;
  border-color: #1e1e1e; border-left-color: var(--term-green);
}
body.dark-mode #modal-node-name-input:focus { border-left-color: var(--term-green-glo); }

/* Tags — fully override light backgrounds */
body.dark-mode .tag-toggle {
  background: #0c0e0f !important; border-color: #252525 !important;
  color: #4a4845 !important;
}
body.dark-mode .tag-toggle:hover { border-color: #3a3835 !important; color: #7a7870 !important; background: #111 !important; }
body.dark-mode .tag-toggle.urgent         { border-color: #4a1a1a !important; }
body.dark-mode .tag-toggle.urgent:hover   { background: #0e0404 !important; }
body.dark-mode .tag-toggle.urgent.active  { background: #1a0404 !important; border-color: #cc2222 !important; color: #ff7777 !important; }
body.dark-mode .tag-toggle.review         { border-color: #3a2e00 !important; }
body.dark-mode .tag-toggle.review:hover   { background: #0e0a00 !important; }
body.dark-mode .tag-toggle.review.active  { background: #1a1200 !important; border-color: #ddaa00 !important; color: #ffcc44 !important; }
body.dark-mode .tag-toggle.personal       { border-color: #0e2a0e !important; }
body.dark-mode .tag-toggle.personal:hover { background: #020e02 !important; }
body.dark-mode .tag-toggle.personal.active{ background: #051405 !important; border-color: #44aa44 !important; color: #66dd66 !important; }

/* Date row */
body.dark-mode #modal-date-row { background: #0c0e0f !important; border-color: #1e1e1e !important; }
body.dark-mode #modal-date { background: transparent; color: #a0a09a; border-left-color: var(--temple-cyan); }
body.dark-mode #modal-date::-webkit-calendar-picker-indicator { filter: invert(1) brightness(0.4); }
body.dark-mode #modal-date-clear { background: #0c0e0f; color: #4a4845; border-color: #1e1e1e; }
body.dark-mode #modal-date-clear:hover { background: #1a1a1a; color: #888; }

/* Close button */
body.dark-mode .modal-close-btn {
  background: #0c0e0f !important; color: #4a4845 !important;
  border-color: #1e1e1e !important;
}
body.dark-mode .modal-close-btn:hover { background: #1a1a1a !important; color: #a0a09a !important; }

/* Size/Color buttons */
body.dark-mode .modal-sc-btn { background: #0c0e0f; border-color: #1e1e1e; }
body.dark-mode .modal-sc-btn:hover { background: #161818; }
body.dark-mode .modal-sc-btn.open { background: #161818; border-color: var(--term-green); }
body.dark-mode .modal-sc-label { color: #4a4845; }
body.dark-mode .modal-sc-value { color: var(--term-green-glo); }
body.dark-mode .modal-sc-arrow { color: #4a4845; }
body.dark-mode .modal-sc-popup { background: #0c0e0f; border-color: var(--term-green); box-shadow: 0 8px 28px rgba(0,0,0,0.7); }
body.dark-mode .modal-sc-popup-title { color: #4a4845; border-color: #1e1e1e; }
body.dark-mode .modal-sc-colordot { border-color: #2a2a2a; }
body.dark-mode .swatch-label { color: #3a3835; }
body.dark-mode .color-swatch.active { box-shadow: 0 0 0 2px #0c0e0f, 0 0 0 3.5px var(--term-green-glo); }

/* Notes textarea */
body.dark-mode #modal-notes {
  background: #0c0e0f; color: #a0a09a;
  border-color: #1e1e1e; border-left-color: var(--term-green);
}
body.dark-mode #modal-notes:focus { background: #0e1010; border-left-color: var(--term-green-glo); }

/* Footer */
body.dark-mode #modal-footer { background: #0c0e0f; border-color: #1a1a1a; }
body.dark-mode .mfooter-btn.danger { background: #0c0e0f; color: #cc4444; border-color: #3a1818; }
body.dark-mode .mfooter-btn.danger:hover { background: #110404; border-color: #cc4444; }
body.dark-mode .mfooter-btn.accent { background: #0c0e0f; color: var(--term-green-glo); border-color: var(--term-green); }
body.dark-mode .mfooter-btn.accent:hover { background: rgba(45,106,45,0.15); }

/* Scrollbars in dark */
body.dark-mode ::-webkit-scrollbar-track { background: #0a0a0a; }
body.dark-mode ::-webkit-scrollbar-thumb { background: #2a2a2a; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--lumon-bg);
  color: var(--lumon-ink);
  font-family: var(--font);
  font-size: 12px;
  user-select: none;
  cursor: default;
}

/* Scanlines + Vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.007) 2px, rgba(0,0,0,0.007) 3px);
  pointer-events: none; z-index: 999;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(170,160,145,0.22) 100%);
  pointer-events: none; z-index: 998;
}

/* ═══ CANVAS ═══ */
#canvas-container {
  position: fixed;
  top: var(--topbar-h);
  left: 0; right: 0;
  bottom: var(--statusbar-h);
  overflow: hidden;
  background: var(--canvas-bg);
}
svg#chart { width: 100%; height: 100%; background: transparent; }

/* ═══ LINKS ═══ */
.link { stroke: #c8c0b0; stroke-width: 1px; fill: none; opacity: 0.75; }
.link.hot { stroke: var(--term-green); stroke-width: 1.5px; opacity: 1; }
.link.connect-related { stroke: #00aacc; stroke-width: 1.5px; stroke-dasharray: 4,3; opacity: 0.9; }

/* ═══ NODES ═══ */
.node { cursor: grab; }
.node:active { cursor: grabbing; }
.node.connect-source .node-body { stroke: var(--temple-cyan) !important; stroke-width: 2.5px !important; filter: url(#glow-cyan) !important; }
.node.connect-eligible .node-body { stroke: var(--temple-lime) !important; stroke-dasharray: 5,3; }
.node-body { stroke-width: 1px; transition: filter 0.18s ease, stroke-width 0.1s; }
.node-body:hover { stroke-width: 1.5px; }
.node-label {
  font-family: var(--font); font-weight: 600;
  text-anchor: middle; dominant-baseline: middle;
  pointer-events: none; letter-spacing: 0.07em;
}
.node-id {
  font-family: var(--font); font-size: 7px; font-weight: 400;
  text-anchor: end; dominant-baseline: middle;
  pointer-events: none; opacity: 0.3; letter-spacing: 0.05em;
}
.node-note-dot { pointer-events: none; }
.node-date-dot { pointer-events: none; }
.node-cross {
  font-family: var(--font); font-size: 9px;
  text-anchor: middle; pointer-events: none; opacity: 0.65;
}
.ripple-ring { fill: none; pointer-events: none; }
.sel-glow { pointer-events: none; }
.connect-wire { stroke: var(--temple-cyan); stroke-width: 1.5px; stroke-dasharray: 6,4; fill: none; opacity: 0.7; pointer-events: none; }
.inline-edit {
  font-family: var(--font); font-weight: 600;
  background: transparent; border: none;
  border-bottom: 1.5px solid currentColor;
  color: inherit; outline: none;
  text-align: center; width: 100%;
  caret-color: currentColor; letter-spacing: 0.07em;
}

/* ═══ TOP BAR ═══ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--lumon-ink);
  border-bottom: 2px solid var(--term-green);
  display: flex; align-items: center;
  padding: 0 16px; gap: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; margin-right: 0; flex-shrink: 0; }
.logo-cross { color: var(--lumon-bg); font-size: 15px; animation: cross-breathe 6s ease-in-out infinite; opacity: 0.4; }
@keyframes cross-breathe { 0%,100%{opacity:0.2} 50%{opacity:0.7} }
.logo-title { color: var(--term-green-glo); font-size: 11px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; }
.logo-divider { color: #555; font-size: 9px; margin: 0 4px; }
.logo-sub { color: #8a8880; font-size: 9px; letter-spacing: 0.12em; }
.bar-sep { width: 1px; height: 20px; background: #383830; margin: 0 10px; flex-shrink: 0; }
.btn {
  font-family: var(--font); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 12px;
  background: transparent; color: #9a9890;
  border: 1px solid #2e2e2e; cursor: pointer;
  transition: all 0.1s; white-space: nowrap; margin: 0 2px;
  height: 30px; display: flex; align-items: center;
}
.btn:hover { background: #1e1e1e; border-color: #444; color: var(--lumon-bg); }
.btn.accent { color: var(--term-green-glo); border-color: var(--term-green); }
.btn.accent:hover { background: rgba(45,106,45,0.18); border-color: var(--term-green-glo); box-shadow: 0 0 8px rgba(77,184,77,0.15); }
.btn.danger { color: #cc4444; border-color: #3a1818; }
.btn.danger:hover { background: #160606; border-color: #cc4444; }
.btn.connect-active { color: var(--temple-cyan); border-color: var(--temple-cyan); background: rgba(0,170,204,0.12); animation: connect-pulse 1.2s ease-in-out infinite; }
@keyframes connect-pulse { 0%,100%{box-shadow: 0 0 0 rgba(0,170,204,0)} 50%{box-shadow: 0 0 10px rgba(0,170,204,0.4)} }
.btn-key { margin-left: 7px; padding: 1px 4px; border: 1px solid #424040; border-radius: 2px; font-size: 7px; color: #666; letter-spacing: 0.05em; }

/* ── Topbar panel tabs (INDEX / CALENDAR / MAP) ── */
#topbar-panels {
  display: flex; align-items: stretch;
  height: 100%;
  margin-left: 8px;
  border-left: 1px solid #222;
  position: relative;
}
.tpanel-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px;
  height: 100%;
  font-family: var(--font); font-size: 8px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: #3a3835; background: transparent; border: none;
  border-right: 1px solid #1a1a1a;
  cursor: pointer;
  transition: color 0.14s, background 0.14s;
  position: relative; white-space: nowrap;
}
.tpanel-tab:hover { color: #888; background: #0a0a0a; }
.tpanel-tab.active { color: var(--term-green-glo); background: rgba(77,184,77,0.04); }
.tpanel-tab.active::after {
  content: '';
  position: absolute; bottom: -2px; left: 0; right: 0; height: 2px;
  background: var(--term-green-glo);
}
.tpanel-tab[data-panel="index"] .tpanel-dot { background: var(--temple-lime); }
.tpanel-tab[data-panel="cal"]   .tpanel-dot { background: var(--temple-yellow); }
.tpanel-tab[data-panel="map"]   .tpanel-dot { background: var(--temple-cyan); }
.tpanel-tab[data-panel="index"].active { color: var(--temple-lime); background: rgba(68,204,0,0.04); }
.tpanel-tab[data-panel="index"].active::after { background: var(--temple-lime); }
.tpanel-tab[data-panel="cal"].active  { color: var(--temple-yellow); background: rgba(204,170,0,0.04); }
.tpanel-tab[data-panel="cal"].active::after  { background: var(--temple-yellow); }
.tpanel-tab[data-panel="map"].active  { color: var(--temple-cyan); background: rgba(0,170,204,0.04); }
.tpanel-tab[data-panel="map"].active::after  { background: var(--temple-cyan); }
.tpanel-dot {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0; opacity: 0.5;
  transition: opacity 0.14s;
}
.tpanel-tab.active .tpanel-dot { opacity: 1; }
/* UI tab colour */
.tpanel-tab[data-panel="ui"] .tpanel-dot { background: #cc8800; }
.tpanel-tab[data-panel="ui"].active { color: #ffaa33; background: rgba(204,136,0,0.06); }
.tpanel-tab[data-panel="ui"].active::after { background: #ffaa33; }

/* ── Undo button ── */
#btn-undo { opacity: 0.35; pointer-events: none; transition: opacity 0.15s; }
#btn-undo.can-undo { opacity: 1; pointer-events: all; }
#btn-redo { opacity: 0.35; pointer-events: none; transition: opacity 0.15s; }

/* ── Arrow-pan mode hint ── */
#arrow-pan-hint {
  position: fixed;
  top: calc(var(--topbar-h) + 12px);
  left: 50%; transform: translateX(-50%);
  background: rgba(16,6,32,0.95);
  border: 1px solid #8866cc;
  padding: 7px 22px;
  font-size: 9px; color: #aa88ff;
  letter-spacing: 0.2em; text-transform: uppercase;
  z-index: 180; pointer-events: none;
  display: none;
  box-shadow: 0 0 22px rgba(136,102,204,0.3);
}
#arrow-pan-hint.visible { display: block; }
.status-val.pan { color: #aa88ff; animation: connect-pulse 1.4s ease-in-out infinite; }

/* ── Notes Panel (in topbar dropdown) ── */
#panel-notes { overflow: hidden; }
#notes-panel-header {
  padding: 6px 12px;
  background: rgba(136,102,204,0.07);
  border-bottom: 1px solid rgba(136,102,204,0.18);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#notes-header-title { font-size: 7px; color: #aa88ff; letter-spacing: 0.22em; font-weight: 700; }
#notes-header-count { font-size: 7px; color: #333; letter-spacing: 0.1em; }
#notes-tree { overflow-y: auto; max-height: 360px; }
#notes-tree::-webkit-scrollbar { width: 4px; }
#notes-tree::-webkit-scrollbar-track { background: #0a0a0a; }
#notes-tree::-webkit-scrollbar-thumb { background: #2a2a2a; }
.nt-group { position: relative; }
.nt-row {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 6px 10px 6px 8px;
  cursor: pointer; border-bottom: 1px solid #0a0a0a;
  transition: background 0.08s; position: relative; user-select: none;
}
.nt-row:hover { background: #0d0d0d; }
.nt-row.depth-0 { background: #060808; padding-left: 8px; }
.nt-row.depth-0:hover { background: #0c0e10; }
.nt-row.depth-1 { padding-left: 20px; }
.nt-row.depth-2 { padding-left: 34px; }
.nt-row.depth-3 { padding-left: 48px; }
.nt-row.is-selected { background: #0a0814 !important; }
.nt-toggle {
  width: 10px; flex-shrink: 0; margin-top: 1px;
  font-size: 7px; color: #2e2c28;
  transition: transform 0.18s cubic-bezier(0.16,1,0.3,1), color 0.12s;
  display: flex; align-items: center; justify-content: center;
}
.nt-row.open .nt-toggle { transform: rotate(90deg); color: #8866cc; }
.nt-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.nt-content { flex: 1; min-width: 0; }
.nt-label {
  font-size: 8px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #6a6860; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.08s; margin-bottom: 2px;
}
.nt-row:hover .nt-label { color: #b0aba4; }
.nt-row.depth-0 .nt-label { color: #9a9890; letter-spacing: 0.16em; }
.nt-preview {
  font-size: 7px; color: #3a3835; line-height: 1.5;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-style: italic;
}
.nt-row:hover .nt-preview { color: #5a5855; }
.nt-badge {
  font-size: 6px; color: #3a3835; background: #111;
  border: 1px solid #1a1a1a; padding: 1px 4px;
  flex-shrink: 0; align-self: center;
}
.nt-children { display: none; border-left: 1px solid #1a1a1a; margin-left: 13px; }
.nt-children.open { display: block; }
.nt-empty { padding: 14px 12px; font-size: 8px; color: #2a2825; letter-spacing: 0.1em; font-style: italic; }
.nt-section-header {
  padding: 5px 10px; font-size: 6px; letter-spacing: 0.22em;
  text-transform: uppercase; color: #2e2c28;
  border-bottom: 1px solid #0d0d0d; background: #050505;
  display: flex; align-items: center; gap: 6px;
}
.nt-section-header::after { content: ''; flex: 1; height: 1px; background: #111; }

/* ── Note Popup ── */
#note-popup {
  position: fixed;
  background: var(--lumon-ink);
  border: 1px solid #2a2060;
  border-top: 2px solid #8866cc;
  width: 360px; max-width: 90vw;
  z-index: 400;
  box-shadow: 0 16px 56px rgba(0,0,0,0.75), 0 0 0 1px #000;
  font-family: var(--font);
  display: none; flex-direction: column;
  border-radius: 2px; overflow: hidden;
}
#note-popup.open { display: flex; }
#note-popup-header {
  padding: 10px 14px 8px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #1a1a1a; background: #080808;
}
#note-popup-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#note-popup-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #c8c4be; flex: 1; }
#note-popup-close {
  background: transparent; border: none; color: #3a3835;
  font-size: 13px; cursor: pointer; padding: 0 2px; line-height: 1;
  font-family: var(--font); transition: color 0.1s;
}
#note-popup-close:hover { color: #aa88ff; }
#note-popup-body {
  padding: 14px 16px 16px;
  font-size: 10px; color: #7a7870; line-height: 1.85;
  white-space: pre-wrap; overflow-y: auto; max-height: 280px;
  font-style: italic; letter-spacing: 0.03em;
}
#note-popup-body::-webkit-scrollbar { width: 3px; }
#note-popup-body::-webkit-scrollbar-thumb { background: #2a2a2a; }
#note-popup-footer {
  padding: 8px 14px; border-top: 1px solid #111;
  display: flex; gap: 8px; background: #060606;
}
.npop-btn {
  font-family: var(--font); font-size: 8px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 14px; cursor: pointer; transition: all 0.1s;
}
.npop-btn.accent { color: #aa88ff; border: 1px solid #5a3a9a; background: transparent; }
.npop-btn.accent:hover { background: rgba(136,102,204,0.18); border-color: #aa88ff; }
.npop-btn.muted { color: #4a4845; border: 1px solid #222; background: transparent; }
.npop-btn.muted:hover { background: #0d0d0d; color: #888; }

/* ── Topbar dropdown panel (slides down from topbar) ── */
#topbar-panel-wrap {
  position: fixed;
  top: var(--topbar-h);
  left: 0;
  width: 320px;
  z-index: 130;
  pointer-events: none;
}
#topbar-panel-wrap.panel-open { pointer-events: all; }

#topbar-panel-body {
  background: var(--lumon-ink);
  border: 1px solid #1e1e1e;
  border-top: none;
  border-left: none;
  box-shadow: 6px 8px 32px rgba(0,0,0,0.55), 0 0 0 1px #000;
  overflow: hidden;
  transform-origin: top left;
  transform: scaleY(0) translateY(-8px);
  opacity: 0;
  transition:
    transform 0.32s cubic-bezier(0.34, 1.28, 0.64, 1),
    opacity   0.22s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform, opacity;
}
#topbar-panel-wrap.panel-open #topbar-panel-body {
  transform: scaleY(1) translateY(0);
  opacity: 1;
}

/* Hover-peek animation on the panel edge when closed */
#topbar-panel-peek {
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--temple-lime), transparent);
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
  transition: opacity 0.2s, transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
  pointer-events: none;
}
#topbar-panel-wrap:not(.panel-open) #topbar-panel-peek.hinting {
  opacity: 0.7;
  transform: scaleX(1);
}

.tpanel-body { display: none; }
.tpanel-body.active { display: flex; flex-direction: column; }

#tp-panel-index { overflow: hidden; }
#tp-index-header {
  padding: 6px 12px;
  background: rgba(68,204,0,0.06);
  border-bottom: 1px solid rgba(68,204,0,0.15);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#tp-index-header-title { font-size: 7px; color: var(--temple-lime); letter-spacing: 0.22em; font-weight: 700; }
#tp-index-count { font-size: 7px; color: #333; letter-spacing: 0.1em; }
#tp-rdx-cards { overflow-y: auto; flex: 1; max-height: 340px; }
#tp-rdx-cards::-webkit-scrollbar { width: 4px; }
#tp-rdx-cards::-webkit-scrollbar-track { background: #0a0a0a; }
#tp-rdx-cards::-webkit-scrollbar-thumb { background: #2a2a2a; }

/* ═══ STATUS BAR ═══ */
#statusbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--statusbar-h);
  background: var(--lumon-ink);
  border-top: 1px solid #1e1e1e;
  display: flex; align-items: center;
  padding: 0 16px; gap: 18px; z-index: 100;
  font-size: 9px;
}
.status-item { display: flex; gap: 6px; align-items: center; }
.status-key { color: #6a6860; letter-spacing: 0.1em; }
.status-val { color: var(--term-green); font-weight: 600; }
.status-val.lit { color: var(--term-green-glo); }
.status-val.dim { color: #686660; }
.status-val.connect { color: var(--temple-cyan); animation: connect-pulse 1.2s ease-in-out infinite; }
#status-msg { flex: 1; text-align: right; color: #686660; font-size: 9px; letter-spacing: 0.04em; font-style: italic; }

/* ═══ NODE TOOLBAR ═══ */
#node-toolbar {
  position: fixed;
  bottom: calc(var(--statusbar-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(80px) scale(0.97);
  transition:
    transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
    opacity   0.28s cubic-bezier(0.4, 0, 0.2, 1),
    filter    0.28s ease;
  opacity: 0; filter: blur(3px);
  z-index: 150; pointer-events: none;
  font-family: var(--font);
}
#node-toolbar.visible {
  transform: translateX(-50%) translateY(0) scale(1);
  opacity: 1; filter: blur(0);
  pointer-events: all;
}
#node-toolbar-inner {
  display: flex; align-items: stretch;
  background: var(--lumon-ink);
  border: 1px solid #2e2e2e;
  box-shadow: 0 -6px 40px rgba(0,0,0,0.6), 0 0 0 1px #000, 0 2px 12px rgba(0,0,0,0.3);
  position: relative;
  border-radius: 2px;
  overflow: hidden;
}
#node-toolbar-inner::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: var(--ntb-accent, var(--term-green));
  opacity: 0.9;
  transition: background 0.3s ease;
}
#ntb-label {
  padding: 0 18px;
  display: flex; flex-direction: column; justify-content: center;
  border-right: 1px solid #1e1e1e;
  min-width: 140px; max-width: 220px;
  cursor: text;
  transition: background 0.15s;
  position: relative;
}
#ntb-label::after {
  content: '✎';
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 9px; color: #3a3835; opacity: 0;
  transition: opacity 0.18s;
}
#ntb-label:hover { background: #0d0d0d; }
#ntb-label:hover::after { opacity: 1; }
#ntb-label-name {
  font-size: 11px; font-weight: 700; color: var(--lumon-bg);
  letter-spacing: 0.1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.15s;
  padding-right: 16px;
}
#ntb-label:hover #ntb-label-name { color: #fff; }
#ntb-label-sub { font-size: 7px; color: #4a4845; letter-spacing: 0.18em; margin-top: 3px; text-transform: uppercase; }
.ntb-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; padding: 12px 22px;
  background: transparent; border: none;
  border-right: 1px solid #1a1a1a;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  font-family: var(--font); min-width: 82px;
}
.ntb-btn:last-child { border-right: none; }
.ntb-btn:hover { background: #0f0f0f; }
.ntb-btn:active { transform: scale(0.95); }
.ntb-icon { font-size: 15px; opacity: 0.45; line-height: 1; color: #aaa; transition: opacity 0.15s, color 0.15s, transform 0.15s; }
.ntb-text { font-size: 8px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #6a6860; transition: color 0.15s; }
.ntb-key  { font-size: 7px; color: #3a3835; letter-spacing: 0.05em; margin-top: 2px; }
.ntb-btn:hover .ntb-icon { transform: translateY(-1px); }
.ntb-btn.add:hover  .ntb-icon  { opacity: 1; color: var(--term-green-glo); }
.ntb-btn.add:hover  .ntb-text  { color: var(--term-green-glo); }
.ntb-btn.notes:hover .ntb-icon { opacity: 1; color: #6699cc; }
.ntb-btn.notes:hover .ntb-text { color: #6699cc; }
.ntb-btn.del:hover   .ntb-icon { opacity: 1; color: #cc4444; transform: translateY(-1px) scale(1.1); }
.ntb-btn.del:hover   .ntb-text { color: #cc4444; }
.ntb-btn.link:hover  .ntb-icon { opacity: 1; color: var(--temple-cyan); }
.ntb-btn.link:hover  .ntb-text { color: var(--temple-cyan); }
.ntb-btn.link.connect-active .ntb-icon { opacity: 1; color: var(--temple-cyan); animation: connect-pulse 1.2s ease-in-out infinite; }
.ntb-btn.link.connect-active .ntb-text { color: var(--temple-cyan); }

/* ═══ CONTEXT MENU ═══ */
#context-menu {
  position: fixed;
  background: var(--lumon-ink);
  border: 1px solid #2e2e2e;
  border-top: 2px solid var(--term-green);
  min-width: 220px;
  z-index: 500; display: none;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5), 0 10px 32px rgba(0,0,0,0.55);
  font-family: var(--font);
}
.ctx-header { padding: 7px 14px 5px; font-size: 8px; color: var(--term-green); border-bottom: 1px solid #1e1e1e; letter-spacing: 0.22em; text-transform: uppercase; }
.ctx-item { padding: 9px 14px; font-size: 10px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.07s, color 0.07s; letter-spacing: 0.06em; border-top: 1px solid #111; }
.ctx-item:first-of-type { border-top: none; }
.ctx-item:hover { background: #1a1a1a; color: var(--lumon-bg); }
.ctx-icon { width: 16px; text-align: center; font-size: 12px; opacity: 0.5; }
.ctx-item:hover .ctx-icon { opacity: 1; }
.ctx-key { margin-left: auto; font-size: 8px; color: #2e2e2e; letter-spacing: 0.05em; }
.ctx-sep { border-top: 1px solid #222 !important; margin-top: 2px; padding-top: 11px; }
.ctx-item.destructive { color: #884444; }
.ctx-item.destructive:hover { background: #140606; color: #ff6666; }
.ctx-item.connect-action { color: #4a9aaa; }
.ctx-item.connect-action:hover { background: #041214; color: var(--temple-cyan); }

/* ═══ ZOOM CONTROLS ═══ */
#zoom-controls {
  position: fixed; right: 16px;
  bottom: calc(var(--statusbar-h) + 16px);
  display: flex; flex-direction: column; gap: 2px; z-index: 120;
}
.zoom-btn {
  width: var(--tc-btn); height: var(--tc-btn);
  background: var(--lumon-ink);
  border: 1px solid #2a2a2a;
  color: #555; font-family: var(--font); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
}
.zoom-btn:hover { background: #1a1a1a; color: var(--term-green-glo); border-color: var(--term-green); }
.hotkey-guide-btn { font-size: 13px; font-weight: 700; letter-spacing: 0; }
.hotkey-guide-btn:hover { color: #ffaa33 !important; border-color: #cc8800 !important; }

/* ═══ MODAL ═══ */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,9,8,0.72);
  backdrop-filter: blur(2px);
  z-index: 200; display: none;
  align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--lumon-bg2);
  border: 1px solid var(--lumon-bg3);
  border-top: 3px solid var(--term-green);
  width: 820px; max-width: 96vw; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 72px rgba(0,0,0,0.35), 4px 4px 0 rgba(0,0,0,0.12);
  overflow: hidden; font-family: var(--font);
}
#modal-header {
  padding: 16px 22px 12px;
  border-bottom: 1px solid var(--lumon-bg3);
  display: flex; align-items: flex-start; gap: 14px; flex-shrink: 0;
  background: var(--lumon-bg);
}
#modal-header-info { flex: 1; }
#modal-node-label { font-size: 17px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 4px; color: var(--lumon-ink); }
#modal-node-meta { font-size: 8px; color: var(--lumon-ink3); letter-spacing: 0.2em; text-transform: uppercase; }
.modal-close-btn {
  font-family: var(--font); font-size: 8px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 6px 12px; background: var(--lumon-bg);
  color: var(--lumon-ink3); border: 1px solid var(--lumon-bg3);
  cursor: pointer; flex-shrink: 0; height: 32px;
  display: flex; align-items: center; transition: background 0.1s;
}
.modal-close-btn:hover { background: var(--lumon-bg3); color: var(--lumon-ink); }
#modal-body { padding: 18px 22px 16px; overflow-y: auto; flex: 1; background: var(--lumon-bg2); display: flex; flex-direction: column; gap: 12px; }
.modal-section-label {
  font-size: 7.5px; color: var(--lumon-ink3);
  letter-spacing: 0.22em; text-transform: uppercase;
  margin-bottom: 8px; padding-bottom: 5px;
  border-bottom: 1px solid var(--lumon-bg3);
  display: flex; align-items: center; gap: 6px;
}
.modal-section-label::before { content:'\25B8'; color: var(--term-green); font-size: 7px; flex-shrink:0; }
/* ── Top row: name + tags ── */
#modal-row-top { display: flex; gap: 16px; align-items: flex-start; }
#modal-name-col { flex: 1; min-width: 0; }
#modal-tags-col { flex-shrink: 0; }
#modal-node-name-input {
  width: 100%; font-family: var(--font); font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--lumon-bg); border: 1px solid var(--lumon-bg3);
  border-left: 3px solid var(--term-green); color: var(--lumon-ink);
  padding: 8px 12px; outline: none; height: 38px;
  transition: border-left-color 0.2s; box-sizing: border-box;
}
#modal-node-name-input:focus { border-left-color: var(--term-green-hi); }
/* ── Date row ── */
#modal-date-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 10px; background: var(--lumon-bg);
  border: 1px solid var(--lumon-bg3);
}
#modal-date {
  flex: 1; font-family: var(--font); font-size: 10px;
  background: transparent; border: none; border-left: 2px solid var(--temple-cyan);
  color: var(--lumon-ink); padding: 4px 10px; outline: none; height: 26px;
}
#modal-date-clear {
  font-family: var(--font); font-size: 7px; font-weight: 600; letter-spacing: 0.12em;
  padding: 4px 8px; background: transparent; border: 1px solid var(--lumon-bg3);
  color: var(--lumon-ink3); cursor: pointer; transition: background 0.1s;
}
#modal-date-clear:hover { background: var(--lumon-bg3); }
/* ── Tag toggles ── */
.tag-toggles { display: flex; gap: 6px; }
.tag-toggle {
  display: flex; align-items: center; gap: 6px; padding: 6px 10px;
  border: 1px solid var(--lumon-bg3); background: var(--lumon-bg);
  cursor: pointer; font-family: var(--font);
  font-size: 8px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--lumon-ink3);
  transition: all 0.12s; white-space: nowrap;
}
.tag-toggle:hover { border-color: var(--lumon-ink4); color: var(--lumon-ink2); }
.tag-toggle-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tag-toggle.urgent { border-color: #5a2020; }
.tag-toggle.urgent .tag-toggle-dot { background: #cc2222; box-shadow: 0 0 5px rgba(204,34,34,0.6); }
.tag-toggle.urgent:hover { background: #0e0202; }
.tag-toggle.urgent.active { background: #160404; border-color: #cc2222; color: #ff7777; }
.tag-toggle.review { border-color: #5a4400; }
.tag-toggle.review .tag-toggle-dot { background: #ddaa00; }
.tag-toggle.review:hover { background: #0e0a00; }
.tag-toggle.review.active { background: #141000; border-color: #ddaa00; color: #ffcc44; }
.tag-toggle.personal { border-color: #1e3e1e; }
.tag-toggle.personal .tag-toggle-dot { background: #44aa44; }
.tag-toggle.personal:hover { background: #020e02; }
.tag-toggle.personal.active { background: #040e04; border-color: #44aa44; color: #66dd66; }
/* ── Size + Color side-by-side popup buttons ── */
#modal-sc-row { display: flex; gap: 10px; }
.modal-sc-cell { flex: 1; position: relative; }
.modal-sc-btn {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; cursor: pointer;
  background: var(--lumon-bg); border: 1px solid var(--lumon-bg3);
  font-family: var(--font); transition: background 0.1s;
  user-select: none;
}
.modal-sc-btn:hover { background: var(--lumon-bg3); }
.modal-sc-btn.open { border-color: var(--term-green); background: var(--lumon-bg3); }
.modal-sc-icon { font-size: 10px; color: var(--term-green); flex-shrink: 0; }
.modal-sc-label { font-size: 7.5px; color: var(--lumon-ink3); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; flex: 1; text-align: left; }
.modal-sc-value { font-size: 9px; color: var(--term-green); font-weight: 700; letter-spacing: 0.1em; flex-shrink: 0; }
.modal-sc-arrow { font-size: 8px; color: var(--lumon-ink3); flex-shrink: 0; transition: transform 0.15s; }
.modal-sc-btn.open .modal-sc-arrow { transform: rotate(180deg); }
.modal-sc-colordot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 1px solid var(--lumon-bg3); }
.modal-sc-popup {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  min-width: 260px; background: var(--lumon-bg);
  border: 1px solid var(--term-green);
  box-shadow: 0 8px 28px rgba(0,0,0,0.28);
  z-index: 500; padding: 14px;
}
.modal-sc-popup.open { display: block; }
#modal-color-cell .modal-sc-popup { min-width: 310px; }
.modal-sc-popup-title {
  font-size: 7px; color: var(--lumon-ink3); letter-spacing: 0.24em;
  text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--lumon-bg3);
}
/* ── Size slider ── */
#size-slider-row { display: flex; align-items: center; gap: 14px; }
#node-size-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 3px; background: var(--lumon-bg3); outline: none; }
#node-size-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--lumon-ink); border: 2px solid var(--term-green); cursor: pointer; }
#size-val { font-size: 10px; color: var(--term-green); min-width: 32px; text-align: right; font-weight: 600; }
/* ── Color grid ── */
#modal-color-row { display: flex; flex-wrap: wrap; gap: 7px; }
.swatch-col { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.color-swatch { width: 28px; height: 28px; border-radius: 3px; transition: transform 0.1s, box-shadow 0.1s; position: relative; }
.swatch-col:hover .color-swatch { transform: scale(1.12); }
.color-swatch.active { box-shadow: 0 0 0 2px var(--lumon-ink), 0 0 0 3.5px var(--term-green); }
.color-swatch.active::after { content:'\2713'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:rgba(255,255,255,0.9); }
.swatch-label { font-size: 6.5px; color: var(--lumon-ink3); letter-spacing: 0.08em; }
/* ── Notes ── */
#modal-notes-section { display: flex; flex-direction: column; }
#modal-notes {
  width: 100%; min-height: 110px; box-sizing: border-box;
  background: var(--lumon-bg); border: 1px solid var(--lumon-bg3);
  border-left: 3px solid var(--term-green);
  color: var(--lumon-ink); font-family: var(--font); font-size: 11px;
  padding: 10px 14px; resize: vertical; outline: none; line-height: 1.8;
  transition: border-left-color 0.2s;
}
#modal-notes:focus { border-left-color: var(--term-green-hi); background: #faf8f4; }
#modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--lumon-bg3);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  background: var(--lumon-bg);
}
#modal-footer .spacer { flex: 1; }
#modal-saved-indicator { font-size: 8px; color: var(--term-green); letter-spacing: 0.16em; opacity: 0; transition: opacity 0.3s; }
#modal-saved-indicator.show { opacity: 1; }
.mfooter-btn { font-family: var(--font); font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; padding: 7px 16px; cursor: pointer; height: 32px; display: flex; align-items: center; transition: all 0.1s; }
.mfooter-btn.danger { color: #cc4444; border: 1px solid #e0cccc; background: var(--lumon-bg); }
.mfooter-btn.danger:hover { background: #fff0f0; border-color: #cc4444; }
.mfooter-btn.accent { color: var(--term-green); border: 1px solid var(--term-green); background: var(--lumon-bg); }
.mfooter-btn.accent:hover { background: var(--term-green-bg); }

/* ── Panels inside topbar dropdown ── */
.tool-panel { display: none; }
.tool-panel.active { display: flex; flex-direction: column; }

/* ── MAP PANEL ── */
#panel-map { padding: 0; }
#map-header {
  padding: 6px 12px;
  background: rgba(0,170,204,0.08);
  border-bottom: 1px solid rgba(0,170,204,0.2);
  display: flex; align-items: center; justify-content: space-between;
}
#map-header-title { font-size: 7px; color: var(--temple-cyan); letter-spacing: 0.22em; font-weight: 700; }
#map-header-meta  { font-size: 7px; color: #2e2e2e; letter-spacing: 0.1em; }
#minimap-canvas { width: 100%; height: auto; display: block; }

/* ── INDEX PANEL ── */
#panel-index { overflow: hidden; }
#index-header {
  padding: 6px 12px;
  background: rgba(68,204,0,0.06);
  border-bottom: 1px solid rgba(68,204,0,0.15);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#index-header-title { font-size: 7px; color: var(--temple-lime); letter-spacing: 0.22em; font-weight: 700; transition: color 0.15s; }
#index-header-title:hover { color: #88ff88; text-decoration: underline; }
#index-header-count { font-size: 7px; color: #333; letter-spacing: 0.1em; }
#rdx-cards { overflow-y: auto; flex: 1; max-height: 340px; }
#rdx-cards::-webkit-scrollbar { width: 4px; }
#rdx-cards::-webkit-scrollbar-track { background: #0a0a0a; }
#rdx-cards::-webkit-scrollbar-thumb { background: #2a2a2a; }

.rdx-card {
  background: var(--lumon-ink);
  border-bottom: 1px solid #111;
  overflow: hidden;
  transition: border-color 0.15s;
  position: relative;
}
.rdx-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  transition: background 0.15s;
}
.rdx-card.color-rose::before   { background: #8a3040; }
.rdx-card.color-amber::before  { background: #8a6020; }
.rdx-card.color-navy::before   { background: #1e3a5f; }
.rdx-card.color-sage::before   { background: #4a7c59; }
.rdx-card.color-white::before  { background: #888880; }
.rdx-card.color-cyan::before   { background: #2a7070; }
.rdx-card.color-plum::before   { background: #5a2a6a; }
.rdx-card.color-rust::before   { background: #7a3820; }
.rdx-card.color-lime::before   { background: #3a7a1e; }
.rdx-card.color-gold::before   { background: #9a7000; }
.rdx-card.color-steel::before  { background: #2e5e88; }
.rdx-card.color-crimson::before{ background: #9a1428; }
.rdx-card.color-olive::before  { background: #5a6028; }
.rdx-card.color-slate::before  { background: #506070; }
.rdx-card.color-coral::before  { background: #9a4838; }
.rdx-card.color-indigo::before { background: #2e2870; }

.rdx-card-tab {
  padding: 9px 12px 9px 16px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.rdx-card-tab:hover { background: #0d0d0d; }
.rdx-tab-color { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.rdx-tab-label { flex: 1; font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #b8b4ae; }
.rdx-tab-badge { font-size: 6px; color: #3a3835; background: #111; border: 1px solid #1e1e1e; padding: 1px 4px; letter-spacing: 0.05em; }
.rdx-tab-id { font-size: 6px; color: #3a3835; letter-spacing: 0.1em; }
.rdx-tab-arrow { font-size: 7px; color: #2a2825; transition: transform 0.22s cubic-bezier(0.16,1,0.3,1), color 0.12s; }
.rdx-card.expanded .rdx-tab-arrow { transform: rotate(90deg); color: var(--term-green); }

.rdx-card-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.28s cubic-bezier(0.16,1,0.3,1);
}
.rdx-card.expanded .rdx-card-body { grid-template-rows: 1fr; }
.rdx-card-body-inner { overflow: hidden; }
.rdx-card-content { padding: 10px 12px 12px 16px; border-top: 1px solid #0d0d0d; background: #080808; }

.rdx-section-label {
  font-size: 6px; letter-spacing: 0.22em;
  text-transform: uppercase; color: #2e2c28;
  margin-bottom: 6px; margin-top: 4px;
  display: flex; align-items: center; gap: 5px;
}
.rdx-section-label::after { content: ''; flex: 1; height: 1px; background: #141414; }

/* Chain tree in index */
.rdx-chain-tree { display: flex; flex-direction: column; gap: 2px; margin-bottom: 10px; }
.rdx-chain-node {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px;
  background: #0d0d0d; border: 1px solid #111;
  cursor: pointer;
  transition: background 0.08s, border-color 0.08s;
}
.rdx-chain-node:hover { background: #141414; border-color: var(--term-green); }
.rdx-chain-indent { width: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end; }
.rdx-chain-indent-bar { width: 1px; height: 12px; background: #1e1e1e; }
.rdx-chain-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.rdx-chain-name { font-size: 8px; font-weight: 600; letter-spacing: 0.1em; color: #6a6860; text-transform: uppercase; flex: 1; }
.rdx-chain-node:hover .rdx-chain-name { color: #b0aca6; }
.rdx-chain-depth { font-size: 6px; color: #2e2c28; }
.rdx-chain-tags { display: flex; gap: 3px; }
.rdx-chain-tag { width: 4px; height: 4px; border-radius: 50%; }

/* Tree hierarchy row types */
.rdx-tree-row {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 1px;
  cursor: pointer;
}
.rdx-tree-indent {
  display: flex; align-items: stretch;
  flex-shrink: 0;
}
.rdx-tree-guide {
  width: 12px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
.rdx-tree-guide-line {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; background: #1e1e1e; transform: translateX(-50%);
}
.rdx-tree-guide-elbow {
  position: absolute; left: 50%; top: 50%;
  width: 6px; height: 6px;
  border-left: 1px solid #1e1e1e;
  border-bottom: 1px solid #1e1e1e;
  transform: translateY(-50%);
}
.rdx-tree-node-row {
  flex: 1; display: flex; align-items: center; gap: 6px;
  padding: 4px 8px 4px 6px;
  background: #0d0d0d; border: 1px solid #111;
  transition: background 0.08s, border-color 0.08s;
}
.rdx-tree-row:hover .rdx-tree-node-row { background: #141414; border-color: var(--term-green); }
.rdx-tree-node-row.parent-row { background: #0a0e0a; border-left: 2px solid #1e2e1e; }
.rdx-tree-node-row.child-row  { background: #080808; }

/* ── Connection status bar ── */
.rdx-conn-bar {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 8px;
  border: 1px solid #0d0d0d;
  overflow: hidden;
}
.rdx-conn-bar-label {
  padding: 4px 8px;
  font-size: 6px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: #3a3835;
  background: #070707;
  border-right: 1px solid #0d0d0d;
  white-space: nowrap;
  flex-shrink: 0;
}
.rdx-conn-chips {
  display: flex; align-items: center; gap: 0;
  flex: 1; overflow: hidden; flex-wrap: nowrap;
}
.rdx-conn-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 7px;
  border-right: 1px solid #0d0d0d;
  cursor: pointer;
  transition: background 0.08s;
  flex-shrink: 0;
  max-width: 90px;
}
.rdx-conn-chip:last-child { border-right: none; }
.rdx-conn-chip:hover { background: #111; }
.rdx-conn-chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.rdx-conn-chip-name {
  font-size: 7px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #5a5855;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rdx-conn-chip:hover .rdx-conn-chip-name { color: #a0a09a; }
.rdx-conn-chip-type {
  font-size: 5px; letter-spacing: 0.08em;
  color: #2e2c28; flex-shrink: 0; text-transform: uppercase;
}
.rdx-conn-chip.chip-parent .rdx-conn-chip-type { color: #2a4a2a; }
.rdx-conn-chip.chip-child  .rdx-conn-chip-type { color: #1a3a4a; }
.rdx-conn-chip.chip-peer   .rdx-conn-chip-type { color: #3a3020; }
.rdx-conn-overflow {
  padding: 4px 7px;
  font-size: 6px; color: #2e2c28; letter-spacing: 0.08em;
  white-space: nowrap; flex-shrink: 0;
}

/* ═══ HIERARCHICAL INDEX TREE ═══ */
.idx-tree { padding: 0; }
.idx-group { position: relative; }

.idx-row {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px 7px 8px;
  cursor: pointer;
  border-bottom: 1px solid #0a0a0a;
  transition: background 0.08s;
  position: relative;
  user-select: none;
}
.idx-row:hover { background: #0d0d0d; }
.idx-row.depth-0 {
  padding-left: 8px;
  background: #070a07;
  border-bottom: 1px solid #111;
}
.idx-row.depth-0:hover { background: #0d120d; }
.idx-row.depth-1 { padding-left: 22px; }
.idx-row.depth-2 { padding-left: 36px; }
.idx-row.depth-3 { padding-left: 50px; }
.idx-row.depth-4 { padding-left: 64px; }

.idx-row.is-selected { background: #0a130a !important; }
.idx-row.is-selected .idx-label { color: #d0cfc8 !important; }

.idx-toggle {
  width: 10px; height: 10px;
  font-size: 7px; color: #2e2c28;
  flex-shrink: 0;
  transition: transform 0.18s cubic-bezier(0.16,1,0.3,1), color 0.12s;
  text-align: center; line-height: 10px;
  display: flex; align-items: center; justify-content: center;
}
.idx-row.open .idx-toggle { transform: rotate(90deg); color: var(--term-green); }
.idx-row.depth-0 .idx-toggle { color: #3a3835; }
.idx-row.depth-0.open .idx-toggle { color: var(--term-green-glo); }

.idx-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.idx-row.depth-0 .idx-dot { width: 7px; height: 7px; }

.idx-label {
  flex: 1; font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #6a6860;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.08s;
}
.idx-row:hover .idx-label { color: #b0aba4; }
.idx-row.depth-0 .idx-label { font-size: 9px; color: #8a8480; letter-spacing: 0.16em; }
.idx-row.depth-0:hover .idx-label { color: #c8c4be; }

.idx-meta {
  display: flex; gap: 4px; align-items: center;
  flex-shrink: 0;
}
.idx-badge {
  font-size: 6px; color: #3a3835;
  background: #111; border: 1px solid #1a1a1a;
  padding: 1px 4px; letter-spacing: 0.05em; flex-shrink: 0;
}

.idx-children {
  display: none;
  border-left: 1px solid #1a1a1a;
  margin-left: 13px;
}
.idx-children.open { display: block; }

/* depth-0 children get a slightly more prominent guide line */
.idx-row.depth-0 + .idx-children { border-left-color: #242420; margin-left: 14px; }

/* "Unlinked" section at bottom of tree */
.idx-unlinked-header {
  padding: 6px 10px;
  font-size: 6px; letter-spacing: 0.22em; text-transform: uppercase;
  color: #2e2c28;
  border-bottom: 1px solid #0d0d0d;
  border-top: 1px solid #111;
  background: #050505;
  display: flex; align-items: center; gap: 6px;
}
.idx-unlinked-header::after { content: ''; flex: 1; height: 1px; background: #111; }

.rdx-digest {
  font-size: 8px; color: #4a4845; line-height: 1.65;
  background: #0a0a0a;
  border-left: 2px solid #1e1e1e;
  padding: 6px 9px;
  margin-bottom: 8px;
  font-style: italic;
  white-space: pre-wrap;
}
.rdx-digest-label { font-size: 6px; color: var(--temple-lime); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 4px; font-style: normal; }
.rdx-no-children { font-size: 7px; color: #2a2825; letter-spacing: 0.1em; padding: 4px 0 8px; }

/* ── CALENDAR PANEL ── */
#panel-cal {
  padding: 0;
  overflow: hidden;
}
#cal-header {
  padding: 6px 12px;
  background: rgba(204,170,0,0.07);
  border-bottom: 1px solid rgba(204,170,0,0.18);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#cal-header-title { font-size: 7px; color: var(--temple-yellow); letter-spacing: 0.22em; font-weight: 700; }
.cal-nav { display: flex; align-items: center; gap: 8px; }
.cal-nav-btn {
  background: transparent; border: none;
  color: #3a3835; font-family: var(--font); font-size: 11px;
  cursor: pointer; padding: 0 4px;
  transition: color 0.1s;
}
.cal-nav-btn:hover { color: var(--temple-yellow); }
#cal-month-label { font-size: 8px; color: #a0a09a; letter-spacing: 0.14em; font-weight: 600; min-width: 80px; text-align: center; }

#cal-body { padding: 8px 10px 10px; flex: 1; overflow-y: auto; }
#cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.cal-day-header {
  text-align: center;
  font-size: 6px; color: #7a7870;
  letter-spacing: 0.12em;
  padding: 4px 0 6px;
  font-weight: 700;
}
.cal-day {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  font-size: 8px; color: #8a8880;
  cursor: pointer;
  border: 1px solid transparent;
  border-radius: 2px;
  transition: background 0.08s, border-color 0.08s;
  position: relative;
  padding: 2px;
}
.cal-day:hover { background: #0d0d0d; border-color: #1e1e1e; }
.cal-day.other-month { opacity: 0.22; cursor: default; }
.cal-day.other-month:hover { background: transparent; border-color: transparent; }
.cal-day.today { color: var(--temple-yellow); }
.cal-day.today::after {
  content: '';
  position: absolute;
  bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--temple-yellow);
}
.cal-day.has-events { color: #d0ccc8; }
.cal-day-num { font-weight: 600; font-size: 8px; line-height: 1; }
.cal-day-dots { display: flex; gap: 1px; flex-wrap: wrap; justify-content: center; min-height: 4px; }
.cal-dot { width: 3.5px; height: 3.5px; border-radius: 50%; flex-shrink: 0; }

/* Event list below calendar */
#cal-event-list { margin-top: 10px; }
#cal-event-header { font-size: 6px; color: #6a6860; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1a1a1a; }
.cal-event-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; background: #0a0a0a;
  border: 1px solid #111; margin-bottom: 2px;
  cursor: pointer; transition: background 0.08s, border-color 0.08s;
}
.cal-event-item:hover { background: #141414; border-color: var(--temple-yellow); }
.cal-event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cal-event-label { font-size: 8px; font-weight: 600; color: #9a9890; letter-spacing: 0.1em; text-transform: uppercase; flex: 1; }
.cal-event-item:hover .cal-event-label { color: #c8c4be; }
.cal-event-date { font-size: 6px; color: #6a6860; letter-spacing: 0.08em; }
.cal-empty { font-size: 7px; color: #4a4845; letter-spacing: 0.1em; padding: 8px 0; font-style: italic; }

/* connect mode overlay hint */
#connect-hint {
  position: fixed;
  top: calc(var(--topbar-h) + 12px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,18,24,0.92);
  border: 1px solid var(--temple-cyan);
  padding: 7px 20px;
  font-size: 9px; color: var(--temple-cyan);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  z-index: 180;
  pointer-events: none;
  display: none;
  box-shadow: 0 0 20px rgba(0,170,204,0.3);
}
#connect-hint.visible { display: block; }

/* ── GUI THEME PICKER ── */
#theme-picker-row {
  display: flex; gap: 6px; align-items: center;
  padding: 8px 12px 8px;
  background: #070707;
  border-top: 1px solid #0d0d0d;
  flex-wrap: wrap;
}
#theme-picker-label { font-size: 6px; color: #3a3835; letter-spacing: 0.2em; text-transform: uppercase; margin-right: 2px; flex-shrink: 0; }
/* ── Legacy theme swatch dot (used in old dropdown — now replaced by grid cells) ── */
.theme-swatch {
  border-radius: 2px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s, background 0.1s, box-shadow 0.1s;
  flex-shrink: 0;
}
.theme-swatch:hover { background: #141410 !important; }

/* ═══ TOOL CLUSTER (BOTTOM LEFT) ═══ */
/* ── Base size for both clusters ── */
:root { --tc-btn: 36px; }

#tool-cluster-left {
  position: fixed;
  left: 16px;
  bottom: calc(var(--statusbar-h) + 16px);
  display: grid;
  grid-template-columns: var(--tc-btn) var(--tc-btn);
  grid-template-rows: var(--tc-btn) var(--tc-btn);
  gap: 2px;
  z-index: 120;
}
.tool-cluster-btn {
  width: var(--tc-btn); height: var(--tc-btn);
  background: var(--lumon-ink);
  border: 1px solid #2a2a2a;
  color: #555; font-family: var(--font); font-size: 14px;
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  transition: all 0.1s;
  position: relative;
}
.tool-cluster-btn:hover { background: #1a1a1a; color: var(--term-green-glo); border-color: var(--term-green); }
.tool-cluster-btn.connect-active { color: var(--temple-cyan); border-color: var(--temple-cyan); background: rgba(0,170,204,0.10); }
.tool-cluster-btn.unlink-active { color: #cc6644; border-color: #cc6644; background: rgba(204,102,68,0.10); }
.tc-key { font-size: 6px; color: #3a3835; letter-spacing: 0.05em; line-height: 1; }
.tool-cluster-btn:hover .tc-key { color: currentColor; opacity: 0.6; }

/* Add button spans both rows, col 2 */
#tcleft-add {
  grid-column: 2;
  grid-row: 1 / 3;
  height: calc(var(--tc-btn) * 2 + 2px); /* two buttons + gap */
  background: rgba(0,0,0,0.7) !important;
  border-color: var(--term-green) !important;
  color: var(--term-green-glo) !important;
  box-shadow: 0 0 8px rgba(77,184,77,0.12);
  font-size: 17px;
}
#tcleft-add:hover {
  background: var(--term-green) !important;
  border-color: var(--term-green-glo) !important;
  color: #fff !important;
  box-shadow: 0 0 14px rgba(77,184,77,0.35) !important;
}
#tcleft-connect { grid-column: 1; grid-row: 1; }
#tcleft-unlink  { grid-column: 1; grid-row: 2; }

/* ── Logo clickable ── */
#logo-btn {
  cursor: pointer;
  padding: 4px 10px 4px 0;
  border-radius: 3px;
  transition: background 0.15s;
  position: relative;
}
#logo-btn { cursor: default; }

/* ── Hotkey popup ── */
#hotkey-popup {
  position: fixed;
  right: calc(var(--tc-btn) + 24px);
  bottom: calc(var(--statusbar-h) + 16px);
  background: var(--lumon-ink);
  border: 1px solid #2a2a2a;
  border-top: 2px solid #cc8800;
  width: 240px;
  z-index: 300;
  display: none;
  flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,0.6);
  font-family: var(--font);
}
#hotkey-popup.open { display: flex; }
#hotkey-popup-header {
  padding: 7px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1a1a1a;
  font-size: 7px; color: #ffaa33; letter-spacing: 0.2em; font-weight: 700;
  background: rgba(204,136,0,0.07);
}
#hotkey-popup-close {
  background: transparent; border: none; color: #3a3835;
  cursor: pointer; font-size: 12px; padding: 0; font-family: var(--font);
  transition: color 0.1s;
}
#hotkey-popup-close:hover { color: #ffaa33; }
#hotkey-popup-body { padding: 8px 12px; }
.hk-row { display: flex; align-items: center; gap: 10px; padding: 3px 0; border-bottom: 1px solid #0d0d0d; }
.hk-key { font-size: 7px; font-weight: 700; color: var(--term-green-glo); letter-spacing: 0.1em; min-width: 55px; flex-shrink: 0; }
.hk-desc { font-size: 8px; color: #5a5855; letter-spacing: 0.05em; }
.hk-sep { height: 1px; background: #1a1a1a; margin: 5px 0; }

/* ── Status ticker ── */
#status-ticker-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
  min-width: 0;
}
#status-ticker-label {
  font-size: 7px;
  color: var(--term-green);
  letter-spacing: 0.18em;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
  opacity: 0.7;
}
#status-ticker-track {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-width: 0;
}
#status-ticker-inner {
  display: inline-flex;
  gap: 0;
  white-space: nowrap;
  animation: ticker-scroll 80s linear infinite;
  will-change: transform;
  transition: animation-play-state 0.3s;
}
#status-ticker-track:hover #status-ticker-inner {
  animation-duration: 280s;
}
#status-ticker-inner.paused { animation-play-state: paused; }
.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 0 18px 0 0;
  font-size: 8px;
  color: #5a5855;
  cursor: pointer;
  transition: color 0.1s;
  letter-spacing: 0.06em;
}
.ticker-item:hover { color: #c8c4be; }
.ticker-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.ticker-tag {
  font-size: 6px;
  padding: 1px 4px;
  border-radius: 1px;
  letter-spacing: 0.1em;
  font-weight: 700;
}
.ticker-tag.urgent { background: rgba(204,34,34,0.2); color: #ff6666; border: 1px solid rgba(204,34,34,0.3); }
.ticker-tag.review { background: rgba(204,170,0,0.2); color: #ddbb44; border: 1px solid rgba(204,170,0,0.3); }
.ticker-sep { color: #2a2825; padding: 0 8px; font-size: 9px; }
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-empty {
  font-size: 8px; color: #2a2825; font-style: italic; letter-spacing: 0.08em;
  padding: 0 10px;
}

/* ═══ UNLINK HINT ═══ */
#unlink-hint {
  position: fixed;
  top: calc(var(--topbar-h) + 12px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(24,8,0,0.92);
  border: 1px solid #cc6644;
  padding: 7px 20px;
  font-size: 9px; color: #ff8866;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  z-index: 180;
  pointer-events: none;
  display: none;
  box-shadow: 0 0 20px rgba(204,102,68,0.3);
}
#unlink-hint.visible { display: block; }

/* ═══ ORPHAN DIALOG ═══ */
#orphan-overlay {
  position: fixed; inset: 0;
  background: rgba(10,9,8,0.7);
  backdrop-filter: blur(2px);
  z-index: 500; display: none;
  align-items: center; justify-content: center;
}
#orphan-overlay.open { display: flex; }
#orphan-dialog {
  background: var(--lumon-ink);
  border: 1px solid #2a2a2a;
  border-top: 2px solid #cc6644;
  width: 360px; max-width: 90vw;
  font-family: var(--font);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}
#orphan-dialog-header {
  padding: 12px 16px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
  color: #ff8866;
  border-bottom: 1px solid #1a1a1a;
  background: rgba(204,102,68,0.07);
}
#orphan-dialog-body {
  padding: 16px;
}
#orphan-dialog-footer {
  padding: 12px 16px; border-top: 1px solid #111;
  display: flex; gap: 8px;
}
.orphan-btn {
  font-family: var(--font); font-size: 8px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 7px 14px; cursor: pointer;
  transition: all 0.1s; flex: 1;
}
.orphan-btn.connect {
  color: var(--temple-cyan); border: 1px solid #1a3a4a; background: transparent;
}
.orphan-btn.connect:hover { background: rgba(0,170,204,0.15); border-color: var(--temple-cyan); }
.orphan-btn.delete {
  color: #cc4444; border: 1px solid #3a1818; background: transparent;
}
.orphan-btn.delete:hover { background: rgba(204,68,68,0.15); border-color: #cc4444; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--lumon-bg3); }
::-webkit-scrollbar-thumb { background: var(--lumon-ink4); }
::-webkit-scrollbar-thumb:hover { background: var(--lumon-ink3); }

/* ═══ TOP MENU DROPDOWN ═══ */
#btn-menu {
  color: var(--term-green-glo) !important;
  border-color: var(--term-green) !important;
  position: relative;
}
#btn-menu:hover { background: rgba(45,106,45,0.18) !important; }
#btn-menu.open { background: rgba(45,106,45,0.18) !important; box-shadow: 0 0 8px rgba(77,184,77,0.15); }

#menu-dropdown {
  position: fixed;
  top: var(--topbar-h);
  right: 0;
  width: 340px;
  background: var(--lumon-ink);
  border: 1px solid #1e1e1e;
  border-top: 2px solid var(--term-green-glo);
  border-right: none;
  box-shadow: -6px 8px 32px rgba(0,0,0,0.65);
  z-index: 200;
  display: none;
  flex-direction: column;
  font-family: var(--font);
}
#menu-dropdown.open { display: flex; }
#menu-dropdown-header {
  padding: 8px 14px 7px;
  border-bottom: 1px solid #111;
  background: rgba(77,184,77,0.04);
  display: flex; align-items: center; justify-content: space-between;
}
#menu-dropdown-title { font-size: 7px; color: var(--term-green-glo); letter-spacing: 0.22em; font-weight: 600; }
#menu-dropdown-close { background: transparent; border: none; color: #3a3835; cursor: pointer; font-size: 13px; font-family: var(--font); transition: color 0.1s; }
#menu-dropdown-close:hover { color: var(--term-green-glo); }
#menu-dropdown-body { padding: 0; display: flex; flex-direction: column; }

.menu-section {
  padding: 8px 14px;
  border-bottom: 1px solid #111;
}
.menu-section-title {
  font-size: 6px; color: #3a3835; letter-spacing: 0.22em;
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.menu-section-title::after { content: ''; flex: 1; height: 1px; background: #1a1a1a; }
.menu-orbit-row {
  display: flex; align-items: center; gap: 6px;
}
.menu-orbit-btn {
  width: 22px; height: 22px; background: #111; border: 1px solid #2a2a2a;
  color: #7a7870; font-family: var(--font); font-size: 13px;
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
}
.menu-orbit-btn:hover { background: #1e1e1e; color: var(--term-green-glo); border-color: var(--term-green); }
.menu-orbit-track {
  flex: 1; display: flex; align-items: center; gap: 6px;
}
#menu-orbit-slider {
  flex: 1; -webkit-appearance: none; height: 2px;
  background: #2a2a2a; outline: none; cursor: pointer;
}
#menu-orbit-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px;
  border-radius: 50%; background: var(--term-green-glo);
  cursor: pointer; box-shadow: 0 0 5px var(--term-green-glo);
}
#menu-orbit-val {
  font-size: 7px; color: var(--term-green-glo); letter-spacing: 0.1em;
  min-width: 24px; text-align: right;
}
/* Scale slider — distinct amber styling */
#menu-scale-slider {
  flex: 1; -webkit-appearance: none; height: 2px;
  background: #2a2a2a; outline: none; cursor: pointer;
}
#menu-scale-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px;
  border-radius: 50%; background: #ffaa33;
  cursor: pointer; box-shadow: 0 0 5px #cc8800;
}
#menu-scale-val {
  font-size: 7px; color: #ffaa33; letter-spacing: 0.1em;
  min-width: 28px; text-align: right;
}
.menu-btn {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; cursor: pointer; background: transparent;
  border: none; border-bottom: 1px solid #0d0d0d;
  font-family: var(--font); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #8a8880; text-align: left;
  transition: all 0.1s;
}
.menu-btn:hover { background: #0d0d0d; color: var(--lumon-bg); }
.menu-btn.danger { color: #cc4444; }
.menu-btn.danger:hover { background: #0e0404; color: #ff6666; }
.menu-btn.binder-btn { color: var(--term-green-glo); border-top: 1px solid #111; }
.menu-btn.binder-btn:hover { background: rgba(45,106,45,0.15); }
.menu-btn-icon { font-size: 10px; flex-shrink: 0; opacity: 0.8; }
.menu-btn-label { flex: 1; }
.menu-btn-key { font-size: 7px; color: #3a3835; padding: 1px 4px; border: 1px solid #2a2a2a; }

/* Dark mode toggle button */
#menu-darkmode-btn { border-top: 1px solid #111; }
#menu-darkmode-btn .dm-indicator {
  width: 28px; height: 14px; border-radius: 7px;
  background: #1a1a1a; border: 1px solid #333;
  position: relative; flex-shrink: 0;
  transition: background 0.2s;
}
#menu-darkmode-btn .dm-indicator::after {
  content: '';
  position: absolute;
  width: 10px; height: 10px; border-radius: 50%;
  background: #3a3835;
  top: 1px; left: 1px;
  transition: transform 0.2s, background 0.2s;
}
#menu-darkmode-btn.dark-on .dm-indicator { background: rgba(45,106,45,0.3); border-color: var(--term-green); }
#menu-darkmode-btn.dark-on .dm-indicator::after { transform: translateX(14px); background: var(--term-green-glo); }
#menu-darkmode-btn.dark-on { color: var(--term-green-glo); }

/* Dark mode dot styles for UI color */
.dm-color-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.dm-color-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 1px solid #2a2a2a; transition: transform 0.12s, box-shadow 0.12s; flex-shrink: 0; }
.dm-color-dot:hover { transform: scale(1.2); }
.dm-color-dot.active { box-shadow: 0 0 0 2px #000, 0 0 0 3px var(--term-green-glo); }

/* Theme mini-swatches in menu */
#menu-theme-swatches {
  display: flex; flex-direction: column; gap: 5px;
  padding: 4px 0;
}
.swatch-group { display: flex; flex-direction: column; gap: 3px; }
.swatch-group-label {
  font-size: 6px; letter-spacing: 0.18em; text-transform: uppercase;
  color: #3a3835; font-weight: 700; padding: 0 1px;
}
.swatch-group-row { display: flex; flex-wrap: wrap; gap: 4px; }
.menu-theme-swatch {
  width: 22px; height: 18px; border-radius: 3px;
  cursor: pointer; border: 1px solid transparent;
  transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.menu-theme-swatch:hover { transform: scale(1.15); }
.menu-theme-swatch.active { border-color: var(--term-green-glo); box-shadow: 0 0 6px rgba(77,184,77,0.4); }

/* ═══ BINDER OVERLAY ═══ */
#binder-overlay {
  position: fixed; inset: 0;
  background: rgba(5,6,5,0.92);
  backdrop-filter: blur(4px);
  z-index: 600;
  display: none;
  align-items: center; justify-content: center;
  font-family: var(--font);
}
#binder-overlay.open { display: flex; }
#binder-container {
  width: 96vw; height: 94vh;
  background: var(--binder-bg);
  border: 1px solid var(--binder-border);
  border-top: 2px solid var(--term-green-glo);
  display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.9);
  overflow: hidden;
  position: relative;
}
#binder-header {
  height: 40px;
  background: var(--binder-bg3);
  border-bottom: 1px solid var(--binder-border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 14px; flex-shrink: 0;
}
#binder-title {
  font-size: 9px; color: var(--term-green-glo);
  font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
  flex: 1;
}
#binder-subtitle {
  font-size: 7px; color: var(--binder-meta-color); letter-spacing: 0.16em;
}
#binder-close {
  background: transparent; border: 1px solid var(--binder-border);
  color: var(--binder-ink3); font-family: var(--font); font-size: 8px;
  letter-spacing: 0.14em; font-weight: 600;
  padding: 4px 12px; cursor: pointer; transition: all 0.1s;
}
#binder-close:hover { border-color: #cc4444; color: #cc4444; background: rgba(204,68,68,0.08); }

#binder-body {
  flex: 1; display: flex; overflow: hidden;
}

/* Binder left: calendar */
#binder-left {
  width: 280px; flex-shrink: 0;
  border-right: 1px solid var(--binder-border);
  background: var(--binder-bg2);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#binder-cal-header {
  padding: 8px 12px 6px;
  background: rgba(204,170,0,0.06);
  border-bottom: 1px solid rgba(204,170,0,0.14);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#binder-cal-title { font-size: 7px; color: var(--temple-yellow); letter-spacing: 0.22em; font-weight: 700; }
.binder-cal-nav { display: flex; align-items: center; gap: 6px; }
.binder-cal-nav-btn {
  background: transparent; border: none;
  color: var(--binder-meta-color); font-family: var(--font); font-size: 11px;
  cursor: pointer; padding: 0 3px;
  transition: color 0.1s;
}
.binder-cal-nav-btn:hover { color: var(--temple-yellow); }
#binder-cal-month { font-size: 7px; color: var(--binder-ink2); letter-spacing: 0.14em; font-weight: 600; min-width: 70px; text-align: center; }
#binder-cal-body { padding: 8px 10px; overflow-y: auto; flex: 1; }
#binder-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.bcal-day-header { text-align: center; font-size: 6px; color: var(--binder-ink3); letter-spacing: 0.1em; padding: 4px 0 5px; font-weight: 700; }
.bcal-day {
  min-height: 26px; border-radius: 2px; padding: 2px 3px;
  display: flex; flex-direction: column; align-items: center;
  font-size: 8px; color: var(--binder-id-color);
  cursor: default; transition: background 0.08s; position: relative;
}
.bcal-day.has-events { cursor: pointer; color: var(--binder-ink2); }
.bcal-day.has-events:hover { background: var(--binder-card-hover); color: #c8c4be; }
.bcal-day.today .bcal-day-num { color: var(--temple-yellow); font-weight: 700; }
.bcal-day.other-month .bcal-day-num { opacity: 0.18; }
.bcal-day-num { line-height: 1.6; }
.bcal-day-dots { display: flex; gap: 1px; flex-wrap: wrap; justify-content: center; max-width: 24px; }
.bcal-dot { width: 4px; height: 4px; border-radius: 50%; }

#binder-events-section { border-top: 1px solid var(--binder-border); }
#binder-events-header {
  padding: 6px 10px;
  font-size: 6px; color: var(--binder-meta-color); letter-spacing: 0.2em;
  background: var(--binder-bg3); border-bottom: 1px solid var(--binder-border2);
}
#binder-events-list { overflow-y: auto; max-height: 110px; }
.binder-event-item {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px; border-bottom: 1px solid var(--binder-border2);
  cursor: pointer; transition: background 0.08s;
}
.binder-event-item:hover { background: var(--binder-card-hover); }
.binder-event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.binder-event-label { flex: 1; font-size: 8px; font-weight: 600; color: var(--binder-ink2); letter-spacing: 0.1em; text-transform: uppercase; }
.binder-event-date { font-size: 6px; color: var(--binder-meta-color); letter-spacing: 0.08em; }

/* Binder minimap */
#binder-map-section { border-top: 1px solid var(--binder-border); flex-shrink: 0; }
#binder-map-header {
  padding: 5px 10px; font-size: 6px; color: #2a5a4a;
  letter-spacing: 0.2em; background: var(--binder-bg3); border-bottom: 1px solid var(--binder-border2);
}
#binder-minimap { width: 100%; height: auto; display: block; background: var(--binder-bg2); cursor: pointer; }

/* Binder inline node editor */
.binder-node-card { cursor: pointer; }
.binder-node-card.expanded { cursor: default; background: var(--binder-card-expanded) !important; border-left-width: 3px !important; }
.bnc-expand-indicator { font-size: 7px; color: var(--binder-id-color); margin-left: auto; transition: transform 0.18s, color 0.1s; display: inline-block; flex-shrink: 0; }
.binder-node-card.expanded .bnc-expand-indicator { transform: rotate(90deg); color: var(--term-green-glo); }
.binder-node-card:hover .bnc-expand-indicator { color: var(--binder-ink2); }
.bnc-kids-badge {
  font-size: 6px; font-weight: 700; letter-spacing: 0.06em;
  background: rgba(45,106,45,0.12); color: var(--term-green); border: 1px solid rgba(45,106,45,0.25);
  padding: 1px 4px; border-radius: 2px; flex-shrink: 0;
}
.bnc-subtree { padding-left: 0; margin-top: 6px; }
.bnc-no-notes {
  font-size: 8px; color: var(--binder-id-color); font-style: italic;
  letter-spacing: 0.04em; padding: 2px 0 4px;
}
.binder-add-root-btn, .bnc-add-child-btn {
  font-family: var(--font); font-size: 7px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 4px 12px; cursor: pointer;
  background: transparent; border: 1px dashed rgba(45,106,45,0.4);
  color: var(--term-green); transition: all 0.1s;
}
.binder-add-root-btn:hover, .bnc-add-child-btn:hover {
  border-color: var(--term-green); color: var(--term-green-glo);
  background: rgba(45,106,45,0.08);
}

.bnc-editor {
  display: none; border-top: 1px solid #1a1a1a; margin-top: 8px; padding-top: 10px;
}
.binder-node-card.expanded .bnc-editor { display: block; }

.bnc-editor-row { margin-bottom: 8px; }
.bnc-editor-label {
  font-size: 6px; color: var(--binder-meta-color); letter-spacing: 0.2em;
  text-transform: uppercase; margin-bottom: 4px;
  display: flex; align-items: center; gap: 4px;
}
.bnc-editor-label::after { content: ''; flex: 1; height: 1px; background: var(--binder-border); }
.bnc-name-input {
  width: 100%; font-family: var(--font); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--binder-input-bg); border: 1px solid var(--binder-border);
  border-left: 2px solid var(--term-green);
  color: var(--binder-ink); padding: 5px 10px; outline: none;
  box-sizing: border-box; transition: border-left-color 0.15s;
}
.bnc-name-input:focus { border-left-color: var(--term-green-glo); background: var(--binder-bg3); }
.bnc-notes-ta {
  width: 100%; min-height: 100px; font-family: var(--font); font-size: 9px;
  line-height: 1.85; letter-spacing: 0.03em;
  background: var(--binder-input-bg); border: 1px solid var(--binder-input-border);
  border-left: 2px solid var(--term-green);
  color: var(--binder-note-color); padding: 8px 12px; outline: none; resize: vertical;
  box-sizing: border-box; transition: border-left-color 0.15s;
}
.bnc-notes-ta:focus { border-left-color: var(--term-green-glo); color: var(--binder-ink2); background: var(--binder-bg3); }
.bnc-date-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--binder-input-bg); border: 1px solid var(--binder-input-border); padding: 4px 8px;
}
.bnc-date-label { font-size: 6px; color: var(--binder-meta-color); letter-spacing: 0.14em; flex-shrink: 0; }
.bnc-date-input {
  flex: 1; font-family: var(--font); font-size: 9px;
  background: transparent; border: none; border-left: 2px solid var(--temple-cyan);
  color: #6a8a8a; padding: 2px 8px; outline: none;
}
.bnc-date-input::-webkit-calendar-picker-indicator { filter: invert(1) brightness(0.4); }
.bnc-date-clear {
  font-family: var(--font); font-size: 6px; font-weight: 600;
  padding: 2px 6px; background: transparent; border: 1px solid var(--binder-border);
  color: var(--binder-meta-color); cursor: pointer; transition: all 0.1s; letter-spacing: 0.1em;
}
.bnc-date-clear:hover { border-color: var(--binder-ink3); color: var(--binder-ink2); }
.bnc-tag-row { display: flex; gap: 5px; }
.bnc-tag-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; cursor: pointer;
  background: var(--binder-input-bg); border: 1px solid var(--binder-input-border);
  font-family: var(--font); font-size: 7px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--binder-meta-color);
  transition: all 0.1s;
}
.bnc-tag-btn:hover { border-color: var(--binder-meta-color); color: var(--binder-ink2); }
.bnc-tag-btn .btag-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.bnc-tag-btn.urgent  { border-color: rgba(204,34,34,0.4); }
.bnc-tag-btn.urgent.active  { background: rgba(204,34,34,0.12); border-color: #cc2222; color: #ff7777; }
.bnc-tag-btn.review  { border-color: rgba(204,170,0,0.4); }
.bnc-tag-btn.review.active  { background: rgba(204,170,0,0.12); border-color: #ddaa00; color: #ffcc44; }
.bnc-tag-btn.personal{ border-color: rgba(68,170,68,0.4); }
.bnc-tag-btn.personal.active{ background: rgba(68,170,68,0.12); border-color: #44aa44; color: #66dd66; }
.bnc-editor-footer { display: flex; gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--binder-border); }
.bnc-save-btn {
  font-family: var(--font); font-size: 7px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 14px; cursor: pointer;
  background: transparent; border: 1px solid var(--term-green);
  color: var(--term-green-glo); transition: all 0.1s;
}
.bnc-save-btn:hover { background: rgba(45,106,45,0.18); box-shadow: 0 0 8px rgba(77,184,77,0.15); }
.bnc-cancel-btn {
  font-family: var(--font); font-size: 7px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 14px; cursor: pointer;
  background: transparent; border: 1px solid var(--binder-border); color: var(--binder-note-color);
  transition: all 0.1s;
}
.bnc-cancel-btn:hover { border-color: var(--binder-meta-color); color: var(--binder-ink2); }
.bnc-saved-flash { font-size: 7px; color: var(--term-green-glo); letter-spacing: 0.14em; opacity: 0; transition: opacity 0.3s; align-self: center; margin-left: auto; }
.bnc-saved-flash.show { opacity: 1; }
#binder-right {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--binder-bg);
}
#binder-rolodex-header {
  height: 36px; border-bottom: 1px solid var(--binder-border);
  display: flex; align-items: center;
  padding: 0 0 0 14px; gap: 0;
  background: var(--binder-bg3); flex-shrink: 0; overflow-x: auto;
}
#binder-rolodex-header::-webkit-scrollbar { height: 2px; }
#binder-rolodex-header::-webkit-scrollbar-thumb { background: #222; }
.binder-parent-tab {
  height: 100%; padding: 0 16px;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font); font-size: 8px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--binder-id-color); background: transparent; border: none;
  border-right: 1px solid #0d0d0d;
  cursor: pointer; white-space: nowrap;
  transition: color 0.12s, background 0.12s;
  position: relative;
}
.binder-parent-tab:hover { color: var(--binder-ink2); background: var(--binder-input-bg); }
.binder-parent-tab.active { color: var(--term-green-glo); background: rgba(77,184,77,0.04); }
.binder-parent-tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--term-green-glo);
}
.binder-tab-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

#binder-rolodex-viewport {
  flex: 1; overflow: hidden; position: relative;
  perspective: 1000px;
}
#binder-card-stage {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
}
.binder-card {
  width: 100%; height: 100%;
