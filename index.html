/* ═══════════════════════════════════════
   CALENDAR
   ═══════════════════════════════════════ */
const MONTH_NAMES = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const DAY_NAMES   = ['SU','MO','TU','WE','TH','FR','SA'];

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[calMonth].slice(0,3)} ${calYear}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day headers
  DAY_NAMES.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const today = new Date();
  const todayStr = formatDate(today.getFullYear(), today.getMonth()+1, today.getDate());

  // First day of month
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  // Build map of dates -> nodes
  const dateMap = buildDateMap();

  // Prev month padding
  for (let i = firstDay-1; i >= 0; i--) {
    const day = daysInPrev - i;
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.innerHTML = `<span class="cal-day-num">${day}</span>`;
    grid.appendChild(cell);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = formatDate(calYear, calMonth+1, d);
    const nodesOnDay = dateMap[dateStr] || [];
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === calSelectedDate;

    const cell = document.createElement('div');
    cell.className = `cal-day${isToday ? ' today' : ''}${nodesOnDay.length > 0 ? ' has-events' : ''}`;
    if (isSelected) cell.style.outline = `1px solid var(--temple-yellow)`;

    const dotsHTML = nodesOnDay.slice(0,4).map(n => {
      const c = colDef(n.colorKey||'sage');
      return `<span class="cal-dot" style="background:${c.stroke}"></span>`;
    }).join('');

    cell.innerHTML = `<span class="cal-day-num">${d}</span><span class="cal-day-dots">${dotsHTML}</span>`;
    cell.addEventListener('click', (e) => {
      e.stopPropagation(); // prevent panel close
      if (nodesOnDay.length > 0) {
        calSelectedDate = dateStr;
        renderCalendar();
        showCalEvents(dateStr, nodesOnDay);
        // Navigate to first node on this date
        const firstNode = nodesOnDay[0];
        select(firstNode.id);
        navigateTo(firstNode);
      }
    });
    grid.appendChild(cell);
  }

  // Next month padding
  const totalCells = firstDay + daysInMonth;
  const remainder  = 7 - (totalCells % 7);
  if (remainder < 7) {
    for (let d = 1; d <= remainder; d++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day other-month';
      cell.innerHTML = `<span class="cal-day-num">${d}</span>`;
      grid.appendChild(cell);
    }
  }

  // Show upcoming events list
  showUpcomingEvents();
}

function buildDateMap() {
  const map = {};
  state.nodes.forEach(n => {
    if (n.dueDate) {
      if (!map[n.dueDate]) map[n.dueDate] = [];
      map[n.dueDate].push(n);
    }
  });
  return map;
}

function formatDate(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function showCalEvents(dateStr, nodes) {
  const eventsEl = document.getElementById('cal-events');
  eventsEl.innerHTML = '';
  document.getElementById('cal-event-header').textContent =
    `NODES FOR ${dateStr}`;
  nodes.forEach(n => {
    const c = colDef(n.colorKey||'sage');
    const row = document.createElement('div');
    row.className = 'cal-event-item';
    row.innerHTML = `
      <span class="cal-event-dot" style="background:${c.stroke}"></span>
      <span class="cal-event-label">${n.label}</span>
      <span class="cal-event-date">ID·${n.id}</span>`;
    row.addEventListener('click', () => {
      select(n.id); navigateTo(n);
      flash(`↗ NAVIGATED TO ${n.label}`);
    });
    eventsEl.appendChild(row);
  });
}

function showUpcomingEvents() {
  // Show all nodes with dates, sorted
  const nodesWithDates = state.nodes.filter(n => n.dueDate).sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  const eventsEl = document.getElementById('cal-events');

  if (calSelectedDate) return; // Let the day click handle display

  eventsEl.innerHTML = '';
  document.getElementById('cal-event-header').textContent = 'SCHEDULED NODES';
  if (nodesWithDates.length === 0) {
    eventsEl.innerHTML = '<div class="cal-empty">No scheduled nodes. Set a due date in node notes.</div>';
    return;
  }
  nodesWithDates.slice(0, 8).forEach(n => {
    const c = colDef(n.colorKey||'sage');
    const row = document.createElement('div');
    row.className = 'cal-event-item';
    row.innerHTML = `
      <span class="cal-event-dot" style="background:${c.stroke}"></span>
      <span class="cal-event-label">${n.label}</span>
      <span class="cal-event-date">${n.dueDate}</span>`;
    row.addEventListener('click', () => {
      select(n.id); navigateTo(n);
      flash(`↗ NAVIGATED TO ${n.label}`);
    });
    eventsEl.appendChild(row);
  });
}

document.getElementById('cal-prev').onclick = () => {
  calSelectedDate = null;
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
};
document.getElementById('cal-next').onclick = () => {
  calSelectedDate = null;
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
};

/* ── Status bar ticker ── */
let _tickerLastKey = null;

function buildTicker() {
  const inner = document.getElementById('status-ticker-inner');
  if (!inner) return;

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const soonDate = new Date(today); soonDate.setDate(soonDate.getDate() + 7);
  const soonStr = `${soonDate.getFullYear()}-${String(soonDate.getMonth()+1).padStart(2,'0')}-${String(soonDate.getDate()).padStart(2,'0')}`;

  const items = state.nodes.filter(n => !n.isRoot && (
    (n.tags && (n.tags.includes('URGENT') || n.tags.includes('REVIEW'))) ||
    (n.dueDate && n.dueDate <= soonStr)
  ));

  // Build a stable key from the items — if unchanged, skip DOM rebuild to preserve animation
  const newKey = items.map(n => `${n.id}:${n.label}:${(n.tags||[]).join(',')}:${n.dueDate||''}:${n.colorKey||''}`).join('|');
  if (newKey === _tickerLastKey) return;
  _tickerLastKey = newKey;

  inner.innerHTML = '';

  if (items.length === 0) {
    inner.innerHTML = '<span class="ticker-empty">— no alerts — all nodes within schedule —</span>';
    document.getElementById('status-ticker-inner').style.animation = 'none';
    return;
  }

  // Duplicate items for seamless loop
  function buildItems(list) {
    return list.map(n => {
      const col = colDef(n.colorKey || 'sage');
      const tags = (n.tags || []).filter(t => t === 'URGENT' || t === 'REVIEW');
      const tagHtml = tags.map(t =>
        `<span class="ticker-tag ${t.toLowerCase()}">${t}</span>`
      ).join('');
      const dateHtml = n.dueDate
        ? `<span style="font-size:7px;color:#8a7a44;margin-left:2px;">${n.dueDate <= todayStr ? '⚠' : '◫'} ${n.dueDate}</span>`
        : '';
      // Diffuse glow color based on tag/node color
      let glowStyle = '';
      if (tags.includes('URGENT')) {
        glowStyle = 'text-shadow:0 0 10px rgba(204,34,34,0.75),0 0 20px rgba(204,34,34,0.35);';
      } else if (tags.includes('REVIEW')) {
        glowStyle = 'text-shadow:0 0 10px rgba(204,170,0,0.75),0 0 20px rgba(204,170,0,0.35);';
      } else if (n.dueDate) {
        const rgb = hexToRgb(col.stroke);
        if (rgb) glowStyle = `text-shadow:0 0 10px rgba(${rgb.r},${rgb.g},${rgb.b},0.60),0 0 20px rgba(${rgb.r},${rgb.g},${rgb.b},0.28);`;
      }
      return `<span class="ticker-item" data-id="${n.id}" style="${glowStyle}">
        <span class="ticker-dot" style="background:${col.stroke};box-shadow:0 0 6px ${col.stroke}88;"></span>
        <span style="letter-spacing:0.08em;">${n.label}</span>
        ${tagHtml}${dateHtml}
      </span><span class="ticker-sep">·</span>`;
    }).join('');
  }

  // Double the content for seamless infinite scroll
  inner.innerHTML = buildItems(items) + buildItems(items);
  inner.style.animation = '';

  // Recalc animation duration based on content width
  requestAnimationFrame(() => {
    const totalW = inner.scrollWidth;
    const halfW = totalW / 2;
    const speed = 20; // px/s — slow crawl
    const dur = Math.max(10, halfW / speed);
    inner.style.animation = `ticker-scroll ${dur}s linear infinite`;
    // Update keyframe dynamically
    const styleId = 'ticker-kf-dynamic';
    let styleEl = document.getElementById(styleId);
    if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = styleId; document.head.appendChild(styleEl); }
    styleEl.textContent = `@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-${halfW}px); } }`;
  });

  // Click to navigate and open details
  inner.querySelectorAll('.ticker-item').forEach(el => {
    el.addEventListener('click', () => {
      const nd = byId(el.dataset.id);
      if (nd) { select(nd.id); navigateTo(nd); openModal(nd.id); }
    });
  });
}

function buildBinderTabs() {
  const header = document.getElementById('binder-rolodex-header');
  header.innerHTML = '';
  const { childrenOf } = buildTreeMaps();
  const root = state.nodes.find(n => n.isRoot);
  const topIds = root ? (childrenOf[root.id] || []) : [];
  const allParents = topIds.length > 0 ? topIds : state.nodes.filter(n=>!n.isRoot).map(n=>n.id).slice(0,8);

  allParents.forEach((pid, i) => {
    const nd = byId(pid); if (!nd) return;
    const cd = colDef(nd.colorKey||'sage');
    const tab = document.createElement('button');
    tab.className = 'binder-parent-tab' + (i === 0 ? ' active' : '');
    tab.dataset.id = pid;
    tab.innerHTML = `<span class="binder-tab-dot" style="background:${cd.stroke}"></span>${nd.label}`;
    tab.addEventListener('click', () => {
      document.querySelectorAll('.binder-parent-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      flipBinderCard(pid);
    });
    header.appendChild(tab);
  });

  if (allParents.length > 0) {
    binderActiveParentId = allParents[0];
    renderBinderCard(allParents[0]);
  }
}

function flipBinderCard(newParentId) {
  const card = document.getElementById('binder-card-active');
  card.classList.add('flipping-out');
  card.addEventListener('animationend', function handler() {
    card.removeEventListener('animationend', handler);
    card.classList.remove('flipping-out');
    binderActiveParentId = newParentId;
    binderActiveNodeId = null;
    renderBinderCard(newParentId);
    card.classList.add('flipping-in');
    card.addEventListener('animationend', function h2() {
      card.removeEventListener('animationend', h2);
      card.classList.remove('flipping-in');
    });
  });
}

  const cd = colDef(nd.colorKey||'sage');

  const nodeDate = nd.dueDate ? `<span style="font-size:6px;color:#ccaa00;letter-spacing:0.1em;">◫ ${nd.dueDate}</span>` : '';
  const tagHtml = (nd.tags||[]).map(t => `<span class="bnc-tag ${t.toLowerCase()}">${t}</span>`).join('');

    <div id="binder-card-parent-title">

      <span style="flex:1"></span>

    html += `<div style="margin-bottom:12px;padding:10px 12px;background:#0a0c0a;border-left:2px solid ${cd.stroke};font-size:9px;color:#4a4845;line-height:1.8;font-style:italic;white-space:pre-wrap;max-height:70px;overflow:hidden;">

function _buildBinderTreeHTML(childrenOf, nodes, depth) {
  if (!nodes.length) return '';
  let html = '';
  nodes.forEach(child => {
    const ccd = colDef(child.colorKey||'sage');
    const cTags = (child.tags||[]).map(t => `<span class="bnc-tag ${t.toLowerCase()}">${t}</span>`).join('');
    const cDate = child.dueDate ? `<span class="bnc-date">◫ ${child.dueDate}</span>` : '';
    const grandchildren = (childrenOf[child.id]||[]).map(id=>byId(id)).filter(Boolean);
    const hasKids = grandchildren.length > 0;
    const notesPreview = child.notes && child.notes.trim()
      ? `<div class="bnc-notes">${child.notes.trim().replace(/</g,'&lt;').slice(0,140)}${child.notes.length>140?'…':''}</div>`
      : `<div class="bnc-no-notes">— no notes —</div>`;

    const tagsUpper = (child.tags||[]).map(t=>t.toUpperCase());
    const urgActive  = tagsUpper.includes('URGENT')   ? 'active' : '';
    const revActive  = tagsUpper.includes('REVIEW')   ? 'active' : '';
    const perActive  = tagsUpper.includes('PERSONAL') ? 'active' : '';

    // Recursively build all children immediately (full tree upfront)
    const childrenHtml = hasKids ? _buildBinderTreeHTML(childrenOf, grandchildren, depth + 1) : '';

    html += `<div class="binder-node-card" data-nid="${child.id}" data-depth="${depth}" style="border-left-color:${ccd.stroke};margin-left:${depth*14}px;">
      <div class="bnc-header">
        <span class="bnc-dot" style="background:${ccd.stroke}"></span>
        <span class="bnc-title">${child.label}</span>
        ${cTags} ${cDate}
        <span class="bnc-id">#${child.id}</span>
        ${hasKids ? `<span class="bnc-kids-badge">${grandchildren.length}</span>` : ''}
        <span class="bnc-expand-indicator">▶</span>
      </div>
      ${notesPreview}
      <!-- Inline editor (hidden until expanded) -->
      <div class="bnc-editor">
        <div class="bnc-editor-row">
          <div class="bnc-editor-label">NODE NAME</div>
          <input class="bnc-name-input" type="text" value="${child.label.replace(/"/g,'&quot;')}" autocomplete="off">
        </div>
        <div class="bnc-editor-row">
          <div class="bnc-editor-label">NOTES</div>
          <textarea class="bnc-notes-ta" rows="5">${(child.notes||'').replace(/</g,'&lt;')}</textarea>
        </div>
        <div class="bnc-editor-row">
          <div class="bnc-date-row">
            <span class="bnc-date-label">DUE DATE</span>
            <input class="bnc-date-input" type="date" value="${child.dueDate||''}">
            <button class="bnc-date-clear">CLEAR</button>
          </div>
        </div>
        <div class="bnc-editor-row">
          <div class="bnc-editor-label">TAGS</div>
          <div class="bnc-tag-row">
            <button class="bnc-tag-btn urgent ${urgActive}" data-tag="URGENT"><span class="btag-dot" style="background:#cc2222;box-shadow:0 0 4px rgba(204,34,34,0.5)"></span>URGENT</button>
            <button class="bnc-tag-btn review ${revActive}" data-tag="REVIEW"><span class="btag-dot" style="background:#ddaa00"></span>REVIEW</button>
            <button class="bnc-tag-btn personal ${perActive}" data-tag="PERSONAL"><span class="btag-dot" style="background:#44aa44"></span>PERSONAL</button>
          </div>
        </div>
        <div class="bnc-editor-footer">
          <button class="bnc-save-btn">SAVE</button>
          <button class="bnc-cancel-btn">CANCEL</button>
          <button class="bnc-add-child-btn" data-parent="${child.id}">+ ADD CHILD</button>
          <span class="bnc-saved-flash">✓ SAVED</span>
        </div>
      </div>
      <!-- Nested children always rendered but hidden until expand -->
      <div class="bnc-subtree">${childrenHtml}</div>
    </div>`;
  });
  return html;
}

function _bindBinderTreeEvents(card, childrenOf) {
  card.querySelectorAll('.binder-node-card').forEach(el => {
    const nid = parseInt(el.dataset.nid);

    el.querySelector('.bnc-header').addEventListener('click', e => {
      e.stopPropagation();
      const wasExpanded = el.classList.contains('expanded');
      // Collapse other cards at same depth level
      const depth = parseInt(el.dataset.depth||0);
      card.querySelectorAll(`.binder-node-card[data-depth="${depth}"].expanded`).forEach(other => {
        if (other !== el) other.classList.remove('expanded');
      });
      el.classList.toggle('expanded', !wasExpanded);
      if (!wasExpanded) {
        binderActiveNodeId = nid;
        drawBinderMinimap(nid);
        el.querySelector('.bnc-notes-ta')?.focus();
      } else {
        binderActiveNodeId = null;
        drawBinderMinimap(null);
      }
    });

    // Tag toggles
    el.querySelectorAll('.bnc-tag-btn[data-tag]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); btn.classList.toggle('active'); });
    });

    // Date clear
    el.querySelector('.bnc-date-clear')?.addEventListener('click', e => {
      e.stopPropagation();
      el.querySelector('.bnc-date-input').value = '';
    });

    // Save
    el.querySelector('.bnc-save-btn')?.addEventListener('click', e => {
      e.stopPropagation();
      const nd = byId(nid); if (!nd) return;
      snapshotForUndo();
      const nameVal = el.querySelector('.bnc-name-input').value.trim().toUpperCase();
      if (nameVal) nd.label = nameVal;
      nd.notes   = el.querySelector('.bnc-notes-ta').value;
      nd.dueDate = el.querySelector('.bnc-date-input').value || null;
      nd.tags    = [...el.querySelectorAll('.bnc-tag-btn.active')].map(b => b.dataset.tag);
      saveState(); renderAll(); refreshIndex();
      // Update live preview without full re-render
      const titleEl = el.querySelector('.bnc-title');
      if (titleEl) titleEl.textContent = nd.label;
      const noteEl = el.querySelector('.bnc-notes');
      if (noteEl) noteEl.textContent = (nd.notes||'').slice(0,140) + ((nd.notes||'').length>140?'…':'');
      const noNotesEl = el.querySelector('.bnc-no-notes');
      if (noNotesEl && nd.notes?.trim()) {
        noNotesEl.className = 'bnc-notes';
        noNotesEl.textContent = nd.notes.slice(0,140) + (nd.notes.length>140?'…':'');
      }
      const flash2 = el.querySelector('.bnc-saved-flash');
      if (flash2) { flash2.classList.add('show'); setTimeout(() => flash2.classList.remove('show'), 1800); }
    });

    // Cancel
    el.querySelector('.bnc-cancel-btn')?.addEventListener('click', e => {
      e.stopPropagation();
      el.classList.remove('expanded');
      binderActiveNodeId = null;
      drawBinderMinimap(null);
    });
  });

  // Add-child buttons (at any level)
  card.querySelectorAll('.bnc-add-child-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const parentId = parseInt(btn.dataset.parent);
      if (!byId(parentId)) return;
      const newId = addNode(parentId, 'NEW_NODE');
      setTimeout(() => {
        renderBinderCard(binderActiveParentId);
        setTimeout(() => {
          const newCard = document.querySelector(`.binder-node-card[data-nid="${newId}"]`);
          if (newCard) {
            newCard.querySelector('.bnc-header')?.click();
            newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }, 80);
      }, 120);
    });
  });
}


/* ── Binder Minimap ── */
function drawBinderMinimap(highlightId) {
  const canvas = document.getElementById('binder-minimap');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080a08';
  ctx.fillRect(0, 0, W, H);

  if (!state.nodes.length) return;

  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  state.nodes.forEach(n => { x0=Math.min(x0,n.x); x1=Math.max(x1,n.x); y0=Math.min(y0,n.y); y1=Math.max(y1,n.y); });
  const pad=60; x0-=pad; y0-=pad; x1+=pad; y1+=pad;
  const bw=x1-x0, bh=y1-y0;
  if (bw<1||bh<1) return;
  const sc = Math.min(W/bw, H/bh) * 0.88;
  const ox = (W - bw*sc)/2 - x0*sc;
  const oy = (H - bh*sc)/2 - y0*sc;

  // Links
  ctx.strokeStyle = '#1a2a1a'; ctx.lineWidth = 0.8;
  state.links.forEach(l => {
    const s=byId(nodeId(l.source)), t=byId(nodeId(l.target));
    if (!s||!t) return;
    ctx.beginPath(); ctx.moveTo(s.x*sc+ox, s.y*sc+oy); ctx.lineTo(t.x*sc+ox, t.y*sc+oy); ctx.stroke();
  });

  // Nodes
  state.nodes.forEach(n => {
    const mx=n.x*sc+ox, my=n.y*sc+oy;
    const isHL = n.id === highlightId;
    const c = n.isRoot ? '#888880' : colDef(n.colorKey).stroke;
    if (isHL) {
      // Draw highlight ring
      ctx.beginPath(); ctx.arc(mx, my, 7, 0, Math.PI*2);
      ctx.fillStyle = c + '33'; ctx.fill();
      ctx.beginPath(); ctx.arc(mx, my, 5, 0, Math.PI*2);
      ctx.strokeStyle = c; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.fillStyle = isHL ? c : c + '88';
    ctx.globalAlpha = isHL ? 1.0 : 0.5;
    ctx.fillRect(mx-3, my-2, 6, 4);
    ctx.globalAlpha = 1;
  });

  // Label for highlighted node
  if (highlightId) {
    const hn = byId(highlightId);
    if (hn) {
      const mx=hn.x*sc+ox, my=hn.y*sc+oy;
      const c = hn.isRoot ? '#888880' : colDef(hn.colorKey).stroke;
      ctx.font = '7px IBM Plex Mono, monospace';
      ctx.fillStyle = c;
      ctx.globalAlpha = 0.9;
      ctx.fillText(hn.label, mx + 7, my + 3);
      ctx.globalAlpha = 1;
    }
  }
}

/* ── Binder Calendar ── */
function renderBinderCalendar() {
  const monthLabel = document.getElementById('binder-cal-month');
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const DAYS   = ['SU','MO','TU','WE','TH','FR','SA'];
  if (monthLabel) monthLabel.textContent = `${MONTHS[binderCalMonth]} ${binderCalYear}`;

  const grid = document.getElementById('binder-cal-grid');
  if (!grid) return;
  grid.innerHTML = '';

  DAYS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'bcal-day-header'; h.textContent = d;
    grid.appendChild(h);
  });

  const today = new Date();
  const todayStr = formatDate(today.getFullYear(), today.getMonth()+1, today.getDate());
  const firstDay = new Date(binderCalYear, binderCalMonth, 1).getDay();
  const daysInMonth = new Date(binderCalYear, binderCalMonth+1, 0).getDate();
  const daysInPrev  = new Date(binderCalYear, binderCalMonth, 0).getDate();
  const dateMap = buildDateMap();

  for (let i = firstDay-1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'bcal-day other-month';
    cell.innerHTML = `<span class="bcal-day-num">${daysInPrev-i}</span>`;
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = formatDate(binderCalYear, binderCalMonth+1, d);
    const nodesOnDay = dateMap[ds] || [];
    const isToday = ds === todayStr;
    const cell = document.createElement('div');
    cell.className = `bcal-day${isToday?' today':''}${nodesOnDay.length>0?' has-events':''}`;
    if (ds === binderCalSelDate) cell.style.outline = '1px solid var(--temple-yellow)';
    const dots = nodesOnDay.slice(0,3).map(n=>`<span class="bcal-dot" style="background:${colDef(n.colorKey||'sage').stroke}"></span>`).join('');
    cell.innerHTML = `<span class="bcal-day-num">${d}</span><span class="bcal-day-dots">${dots}</span>`;
    if (nodesOnDay.length > 0) {
      cell.addEventListener('click', e => {
        e.stopPropagation();
        binderCalSelDate = ds;
        renderBinderCalendar();
        buildBinderEvents(ds, nodesOnDay);
        // Navigate to first node
        const first = nodesOnDay[0];
        select(first.id); navigateTo(first);
      });
    }
    grid.appendChild(cell);
  }

  const totalCells = firstDay + daysInMonth;
  const remainder  = 7 - (totalCells % 7);
  if (remainder < 7) {
    for (let d2 = 1; d2 <= remainder; d2++) {
      const cell = document.createElement('div');
      cell.className = 'bcal-day other-month';
      cell.innerHTML = `<span class="bcal-day-num">${d2}</span>`;
      grid.appendChild(cell);
    }
  }

  if (!binderCalSelDate) buildBinderUpcoming();
}

function buildBinderEvents(ds, nodes) {
  const list = document.getElementById('binder-events-list');
  document.getElementById('binder-events-header').textContent = `NODES FOR ${ds}`;
  list.innerHTML = '';
  nodes.forEach(n => {
    const c = colDef(n.colorKey||'sage');
    const row = document.createElement('div');
    row.className = 'binder-event-item';
    row.innerHTML = `<span class="binder-event-dot" style="background:${c.stroke}"></span><span class="binder-event-label">${n.label}</span><span class="binder-event-date">ID·${n.id}</span>`;
    row.addEventListener('click', () => { closeBinder(); select(n.id); navigateTo(n); });
    list.appendChild(row);
  });
}

function buildBinderUpcoming() {
  const list = document.getElementById('binder-events-list');
  document.getElementById('binder-events-header').textContent = 'SCHEDULED NODES';
  list.innerHTML = '';
  const sorted = state.nodes.filter(n=>n.dueDate).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  if (!sorted.length) { list.innerHTML = '<div class="binder-event-item" style="color:#2a2825;font-style:italic;font-size:7px;justify-content:center;">No scheduled nodes</div>'; return; }
  sorted.slice(0,8).forEach(n => {
    const c = colDef(n.colorKey||'sage');
    const row = document.createElement('div');
    row.className = 'binder-event-item';
    row.innerHTML = `<span class="binder-event-dot" style="background:${c.stroke}"></span><span class="binder-event-label">${n.label}</span><span class="binder-event-date">${n.dueDate}</span>`;
    row.addEventListener('click', () => { closeBinder(); select(n.id); navigateTo(n); });
    list.appendChild(row);
  });
}

let arrowPanMode = false;
let _lastSpaceTime = 0;
const PAN_STEP = 80; // px per keypress

function enterArrowPanMode() {

/* ═══════════════════════════════════════
   KEYBOARD SHORTCUTS
   ═══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  // Ctrl+Z undo — works even in inputs
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (!document.getElementById('modal-overlay').classList.contains('open')) {
      e.preventDefault(); performUndo(); return;
    }
  }
  // Ctrl+Y or Ctrl+Shift+Z redo
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
    if (!document.getElementById('modal-overlay').classList.contains('open')) {
      e.preventDefault(); performRedo(); return;
    }
  }

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (editingId != null) return;
  if (document.getElementById('modal-overlay').classList.contains('open')) return;

  // Arrow pan mode navigation
  if (arrowPanMode) {
    let dx = 0, dy = 0;
    if (e.key === 'ArrowLeft')  { dx =  PAN_STEP; e.preventDefault(); }
    if (e.key === 'ArrowRight') { dx = -PAN_STEP; e.preventDefault(); }
    if (e.key === 'ArrowUp')    { dy =  PAN_STEP; e.preventDefault(); }
    if (e.key === 'ArrowDown')  { dy = -PAN_STEP; e.preventDefault(); }
    if (dx !== 0 || dy !== 0) {
      const t = state.transform;
      d3.select(svgEl).transition().duration(140).ease(d3.easeCubicOut)
        .call(svgZoom.transform, d3.zoomIdentity.translate(t.x + dx, t.y + dy).scale(t.k));
      return;
    }
    if (e.key === 'Enter') { e.preventDefault(); exitArrowPanMode(); return; }
    if (e.key === 'Escape') { exitArrowPanMode(); return; }
  }

  switch (e.key) {
    case ' ': {
      // Double-space with nothing selected → enter pan mode
      if (!state.selectedId) {
        e.preventDefault();
        const now = Date.now();
        if (now - _lastSpaceTime < 400) {
          enterArrowPanMode();
          _lastSpaceTime = 0;
        } else {
          _lastSpaceTime = now;
        }
      }
      break;
    }
    case 'a': case 'A': {
      e.preventDefault();
      const pid = state.selectedId ?? state.nodes[0]?.id;
      if (pid) addNode(pid);
      break;
    }
    case 'c': case 'C': {
      e.preventDefault();
      if (state.unlinkMode) { exitUnlinkMode(); break; }
      if (state.connectMode) {
        exitConnectMode(); flash('CONNECTION CANCELLED');
      } else if (state.selectedId) {
        enterConnectMode(state.selectedId);
        renderConnectWire();
      } else {
        flash('⟷ SELECT A NODE FIRST TO CONNECT');
      }
      break;
    }
    case 'u': case 'U': {
      e.preventDefault();
      if (state.unlinkMode) exitUnlinkMode();
      else enterUnlinkMode();
      break;
    }
    case 'e': case 'E': {
      e.preventDefault();
      if (state.selectedId) startEdit(byId(state.selectedId));
      break;
    }
    case 'n': case 'N': {
      e.preventDefault();
      if (state.selectedId) openModal(state.selectedId);
      break;
    }
    case 'Delete': case 'Backspace': {
      if (state.selectedId) { e.preventDefault(); deleteNode(state.selectedId); }
      break;
    }
    case 'r': case 'R': {
      e.preventDefault(); resetView();
      break;
    }
    case '+': case '=': {
      e.preventDefault();
      d3.select(svgEl).transition().duration(220).ease(d3.easeCubicOut).call(svgZoom.scaleBy, 1.3);
      break;
    }
    case '-': case '_': {
      e.preventDefault();
      d3.select(svgEl).transition().duration(220).ease(d3.easeCubicOut).call(svgZoom.scaleBy, 1/1.3);
      break;
    }
    case 'Escape': {
      if (arrowPanMode) { exitArrowPanMode(); break; }
      if (state.unlinkMode) { exitUnlinkMode(); break; }
      if (state.connectMode) { exitConnectMode(); flash('CONNECTION CANCELLED'); }
      else { select(null); commitEdit(); hideCtxMenu(); closeModal(); }
      break;
    }
  }
});

/* ═══════════════════════════════════════
   MINIMAP
   ═══════════════════════════════════════ */
function drawMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0c0a';
  ctx.fillRect(0, 0, W, H);
  if (!state.nodes.length) return;

  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  state.nodes.forEach(n => {
    x0=Math.min(x0,n.x); x1=Math.max(x1,n.x);
    y0=Math.min(y0,n.y); y1=Math.max(y1,n.y);
  });
  const pad=60; x0-=pad; y0-=pad; x1+=pad; y1+=pad;
  const bw=x1-x0, bh=y1-y0;
  if (bw<1||bh<1) return;
  const sc = Math.min(W/bw, H/bh) * 0.88;
  const ox = (W - bw*sc)/2 - x0*sc;
  const oy = (H - bh*sc)/2 - y0*sc;

  // Links
  ctx.strokeStyle = '#1e2a1e'; ctx.lineWidth = 0.8;
  state.links.forEach(l => {
    const s=byId(nodeId(l.source)), t=byId(nodeId(l.target));
    if (!s||!t) return;
    ctx.beginPath(); ctx.moveTo(s.x*sc+ox, s.y*sc+oy); ctx.lineTo(t.x*sc+ox, t.y*sc+oy); ctx.stroke();
  });

  // Nodes
  state.nodes.forEach(n => {
    const mx=n.x*sc+ox, my=n.y*sc+oy;
    const c = n.isRoot ? '#888880' : colDef(n.colorKey).stroke;
    ctx.fillStyle = c;
    ctx.globalAlpha = n.id === state.selectedId ? 1.0 : 0.55;
    ctx.fillRect(mx-3.5, my-2, 7, 4);
    ctx.globalAlpha = 1;
  });

  // Viewport rect
  const tr = state.transform;
  const vx=(-tr.x/tr.k)*sc+ox, vy=(-tr.y/tr.k)*sc+oy;
  const vw=(window.innerWidth/tr.k)*sc, vh=((window.innerHeight-48-26)/tr.k)*sc;
  ctx.strokeStyle='rgba(0,170,204,0.4)'; ctx.lineWidth=0.8; ctx.strokeRect(vx,vy,vw,vh);

  // Connect source indicator
  if (state.connectMode && state.connectSourceId) {
    const nd = byId(state.connectSourceId);
    if (nd) {
      ctx.strokeStyle='#00aacc'; ctx.lineWidth=1;
      ctx.strokeRect(nd.x*sc+ox-5, nd.y*sc+oy-4, 10, 7);
    }
  }
}

/* ═══════════════════════════════════════
   BOOT
   ═══════════════════════════════════════ */
function boot() {
  const loaded = loadState();
  if (!loaded || state.nodes.length === 0) defaults();

  initSim(); initZoom(); renderAll();

  simulation.nodes(state.nodes);
  simulation.force('link').links(state.links);
  simulation.force('cx').x(window.innerWidth/2).strength(0.03);
  simulation.force('cy').y(window.innerHeight/2).strength(0.03);
  applyRootOrbitForce();
  simulation.alphaTarget(CFG.collideAlphaFloor).alpha(0.7).restart();

  updateStatus();
  drawGrid();
  initThemePicker();
  initRootGlow();
  buildIndex();
  // Sync orbit slider to loaded value
  const orbitSlider = document.getElementById('menu-orbit-slider');
  const orbitVal    = document.getElementById('menu-orbit-val');
  if (orbitSlider) { orbitSlider.value = state.rootOrbitRadius ?? 220; }
  if (orbitVal)    { orbitVal.textContent = state.rootOrbitRadius ?? 220; }
  // Open the panel by default after a short delay for smooth intro
  setTimeout(() => { panelWrap.classList.add('panel-open'); }, 200);
  flash(loaded ? '✝ RECORD RESTORED' : '✝ GOD IS GOOD. WELCOME TO BRAINBUG.');
  setTimeout(startDrift, 4000);

  // Load dark mode preference
  try {
    const dm = localStorage.getItem('brainbug_darkmode');
    if (dm === '1') applyDarkMode(true);
  } catch(e) {}

  // Load UI scale
  try {
    const savedScale = localStorage.getItem('brainbug_ui_scale');
    if (savedScale) {
      const v = Math.max(85, Math.min(130, parseInt(savedScale)));
      document.documentElement.style.zoom = v / 100;
      const sc2 = document.getElementById('menu-scale-slider');
      const sv2 = document.getElementById('menu-scale-val');
      if (sc2) sc2.value = v;
      if (sv2) sv2.textContent = v + '%';
    }
  } catch(e) {}

  // Sync menu theme swatches with active theme
  setTimeout(() => {
    document.querySelectorAll('.menu-theme-swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.theme === activeTheme);
    });
  }, 100);
}

/* ── Long-press → context menu (replaces right-click) ──
   Hold for 400ms on a node to open the context menu.
   Short tap still selects. Drag cancels the timer. */
(function() {
  let _lpTimer = null;
  let _lpNode = null;
  let _lpX = 0, _lpY = 0;
  let _lpMoved = false;

  document.addEventListener('touchstart', e => {
    const nodeEl = e.target.closest('g.node');
    if (!nodeEl) return;
    _lpMoved = false;
    const touch = e.touches[0];
    _lpX = touch.clientX; _lpY = touch.clientY;

    _lpTimer = setTimeout(() => {
      if (_lpMoved) return;
      // Vibrate if available (haptic feedback on Android)
      if (navigator.vibrate) navigator.vibrate(40);
      // Get D3 datum
      const d = d3.select(nodeEl).datum();
      if (d) {
        select(d.id);
        spawnRipple(d);
        // Position context menu near the touch point, clamped to screen
        const menuEl = document.getElementById('context-menu');
        const mw = 270, mh = 260;
        const x = Math.min(_lpX, window.innerWidth - mw - 8);
        const y = Math.min(_lpY - 20, window.innerHeight - mh - 8);
        showCtxMenu(Math.max(8, x), Math.max(64, y), d);
      }
      _lpTimer = null;
    }, 400);
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    const touch = e.touches[0];
    const dx = Math.abs(touch.clientX - _lpX);
    const dy = Math.abs(touch.clientY - _lpY);
    if (dx > 8 || dy > 8) {
      _lpMoved = true;
      if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
    }
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
  }, { passive: true });
})();

/* ── Menu closes on backdrop tap (mobile sheet) ── */
document.getElementById('menu-dropdown').addEventListener('touchstart', e => {
  e.stopPropagation();
}, { passive: true });

/* ── Double-tap to open node details (mobile replacement for dblclick) ──
   D3 fires 'click' on touchend, so native dblclick usually works,
   but this ensures reliability on iOS Safari. ── */
(function() {
  let _lastTap = 0;
  let _lastTapId = null;
  svgEl.addEventListener('touchend', e => {
    const nodeEl = e.target.closest('g.node');
    if (!nodeEl) return;
    const d = d3.select(nodeEl).datum();
    if (!d) return;
    const now = Date.now();
    if (now - _lastTap < 350 && _lastTapId === d.id) {
      e.preventDefault();
      openModal(d.id);
      _lastTap = 0; _lastTapId = null;
    } else {
      _lastTap = now;
      _lastTapId = d.id;
    }
  }, { passive: false });
})();

/* ── UI scale: not needed on mobile (browser zoom handles it) ──
   Stub out the scale init so no errors if the DOM elements are missing. ── */
(function() {
  const slider = document.getElementById('menu-scale-slider');
  if (slider) slider.closest('.menu-section')?.remove?.();
  try {
    const saved = localStorage.getItem('brainbug_ui_scale');
    if (saved) {
      const v = Math.max(85, Math.min(130, parseInt(saved)));
      document.documentElement.style.zoom = v / 100;
    }
  } catch(e) {}
})();

/* ── Undo/Redo/Reset in menu — wrap originals to also close the menu ── */
(function() {
  const uBtn = document.getElementById('btn-undo');
  const rBtn = document.getElementById('btn-redo');
  const rvBtn = document.getElementById('btn-reset-view');
  if (uBtn) uBtn.onclick = () => { closeMenu(); performUndo(); };
  if (rBtn) rBtn.onclick = () => { closeMenu(); performRedo(); };
  if (rvBtn) rvBtn.onclick = () => { closeMenu(); resetView(); };
})();

/* ── Recalculate canvas size with bottom toolbar ── */
function updateCanvasBottom() {
  const toolbar = document.getElementById('node-toolbar');
  const tbVisible = toolbar.classList.contains('visible');
  const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom')) || 0;
  const bottomBarH = 64;
  document.getElementById('canvas-container').style.bottom =
    `calc(${bottomBarH}px + ${safeBottom}px)`;
}
// Keep canvas recalculated
const _origUpdateNTB = updateNodeToolbar;
updateNodeToolbar = function() {
  _origUpdateNTB.apply(this, arguments);
  updateCanvasBottom();
};



setInterval(saveState, 20000);
boot();
</script>
